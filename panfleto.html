<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Digital de Imóveis — FCosta Corretor | CRECI-SP 294791-F</title>
<meta name="description" content="Catálogo digital com panfletos e materiais dos imóveis FCosta Corretor em São Paulo. CRECI-SP 294791-F.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --azul:#003da5;--azul-escuro:#002580;--vermelho:#dc1c2d;--dourado:#b8860b;
  --branco:#ffffff;--cinza-claro:#f4f6fa;--cinza-meio:#888;
  --cinza-escuro:#2a2a2a;--preto:#0d1829;--borda:#e2e8f0;
  --sombra:0 4px 24px rgba(0,61,165,0.10);
}
html,body{font-family:'DM Sans',sans-serif;background:var(--cinza-claro);color:var(--cinza-escuro);overflow-x:hidden;width:100%;max-width:100vw;}
header{background:var(--azul);border-bottom:3px solid var(--dourado);padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,61,165,.3);}
.navbar{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;height:64px;gap:12px;}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-wrap img{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);object-fit:cover;flex-shrink:0;}
.logo-nome{font-family:'Playfair Display',serif;font-size:18px;font-weight:800;color:#fff;line-height:1;}
.logo-creci{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;}
.nav-links{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.nav-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;border:none;font-family:'DM Sans',sans-serif;}
.nav-btn.ghost{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;}
.nav-btn.ghost:hover{background:rgba(255,255,255,.22);}
.nav-btn.wpp{background:#25d366;color:#fff;}
.nav-btn.ativo{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);color:#fff;font-weight:700;}
@media(max-width:600px){.logo-nome{font-size:16px;}.logo-creci{display:none;}.nav-btn span{display:none;}.nav-btn{padding:8px 10px;}}
.hero{background:linear-gradient(135deg,#b8860b 0%,#8B6508 100%);color:#fff;padding:48px 20px 40px;text-align:center;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,44px);font-weight:800;margin-bottom:10px;line-height:1.2;}
.hero p{font-size:15px;opacity:.85;}
.container{max-width:1200px;margin:0 auto;padding:32px 16px 60px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;}
@media(max-width:480px){.cards-grid{grid-template-columns:repeat(2,1fr);gap:12px;}}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--sombra);transition:all .3s;cursor:pointer;display:flex;flex-direction:column;}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(184,134,11,.2);}
.card-imagem{width:100%;height:0;padding-bottom:145%;position:relative;background:var(--cinza-claro);overflow:hidden;}
.card-imagem img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform .4s;}
.card:hover .card-imagem img{transform:scale(1.03);}
.card-badge{position:absolute;top:10px;left:10px;background:var(--dourado);color:#fff;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:1px;z-index:1;}
.card-icone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;color:#ccc;}
.card-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px;}
.card-sigla{font-size:10px;color:var(--cinza-meio);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.card-titulo{font-size:13px;font-weight:700;color:var(--cinza-escuro);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-preco{font-size:14px;color:var(--vermelho);font-weight:700;}
.card-buttons{display:flex;gap:6px;flex-wrap:wrap;}
.btn-card{flex:1;padding:8px 6px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:11px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn-ver{background:var(--azul);color:#fff;}.btn-ver:hover{background:var(--azul-escuro);}
.btn-wpp-card{background:#25d366;color:#fff;}.btn-wpp-card:hover{background:#1da852;}
.btn-share{background:linear-gradient(135deg,#20c35a,#17a84b);color:#fff;flex:0 0 auto;width:34px;border-radius:6px;}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--cinza-meio);}
.empty-state i{font-size:56px;display:block;margin-bottom:16px;opacity:.3;}
.skeleton{background:#e2e8f0;border-radius:14px;overflow:hidden;}
.skeleton-img{width:100%;padding-bottom:145%;background:linear-gradient(90deg,#e2e8f0 25%,#f4f6fa 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
.skeleton-body{padding:14px;}
.skeleton-line{height:10px;border-radius:6px;margin-bottom:8px;background:linear-gradient(90deg,#e2e8f0 25%,#f4f6fa 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
.skeleton-line.w60{width:60%;}.skeleton-line.w80{width:80%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
footer{background:var(--preto);color:#fff;padding:28px 20px;}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
.footer-copy{font-size:12px;color:rgba(255,255,255,.45);}
.footer-links{display:flex;gap:20px;flex-wrap:wrap;}
.footer-links a{font-size:12px;color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s;}
.footer-links a:hover{color:#fff;}
.btn-voltar{display:inline-flex;align-items:center;gap:8px;background:var(--azul);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;}
</style>
</head>
<body>
<header>
  <div class="navbar">
    <a class="logo-wrap" href="https://fcostacorretor.com">
      <img src="https://i.postimg.cc/xTQzc3RV/495379823-122128221800669140-5238985291153506093-n-photoaidcom-cropped.png" alt="FCosta Corretor">
      <div><div class="logo-nome">FCosta Corretor</div><div class="logo-creci">CRECI-SP 294791-F</div></div>
    </a>
    <div class="nav-links">
      <a class="nav-btn ghost" href="https://fcostacorretor.com"><i class="fas fa-home"></i><span> Home</span></a>
      <a class="nav-btn ghost" href="https://fcostacorretor.com/comprar"><i class="fas fa-home"></i><span> Comprar</span></a>
      <a class="nav-btn ghost" href="https://fcostacorretor.com/alugar"><i class="fas fa-key"></i><span> Alugar</span></a>
      <a class="nav-btn ativo" href="#"><i class="fas fa-book-open"></i><span> Catálogo</span></a>
      <a class="nav-btn wpp" href="https://wa.me/5511993509109?text=Ol%C3%A1!%20Gostaria%20de%20informa%C3%A7%C3%B5es%20sobre%20o%20cat%C3%A1logo." target="_blank" rel="noopener noreferrer"><i class="fab fa-whatsapp"></i><span> WhatsApp</span></a>
    </div>
  </div>
</header>
<section class="hero">
  <h1><i class="fas fa-book-open" style="font-size:.8em;opacity:.8;"></i> Catálogo Digital</h1>
  <p>Acesse panfletos e materiais dos imóveis FCosta Corretor em São Paulo</p>
</section>
<div class="container">
  <div class="cards-grid" id="cards-grid">
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div></div>
  </div>
</div>
<footer>
  <div class="footer-inner">
    <a class="btn-voltar" href="https://fcostacorretor.com"><i class="fas fa-arrow-left"></i> Voltar à Home</a>
    <span class="footer-copy">© 2026 FCosta Corretor — CRECI-SP 294791-F</span>
    <div class="footer-links">
      <a href="https://fcostacorretor.com/politica-de-privacidade" target="_blank" rel="noopener noreferrer"><i class="fas fa-shield-alt"></i> Privacidade</a>
      <a href="https://fcostacorretor.com/condicoes-de-uso" target="_blank" rel="noopener noreferrer"><i class="fas fa-file-alt"></i> Termos de Uso</a>
    </div>
  </div>
</footer>
<script>
var FB_URL='https://fcosta-31125-default-rtdb.firebaseio.com';
var _isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);

function toArr(v){
  if(!v)return[];
  if(Array.isArray(v))return v.filter(Boolean);
  if(typeof v==='object')return Object.keys(v).sort(function(a,b){return Number(a)-Number(b);}).map(function(k){return v[k];}).filter(Boolean);
  return[];
}
function otimizarFoto(url){
  if(!url)return null;
  if(url.includes('cloudinary.com'))return url.replace('/upload/','/upload/w_400,q_auto,f_auto/');
  return url;
}
function esc(s){
  return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function carregarCatalogo(){
  try{
    var r=await fetch(FB_URL+'/fcosta_imoveis.json');
    var d=await r.json();
    if(!d){mostrarVazio();return;}
    var lista=Array.isArray(d)
      ?d.filter(Boolean)
      :Object.entries(d).filter(function(e){return e[1];}).map(function(e){return Object.assign({},e[1],{_uid:e[1]._uid||e[0]});});
    var catalogo=lista.filter(function(i){return(i.sigla||'').toUpperCase()==='FCP';});
    if(!catalogo.length){mostrarVazio();return;}
    renderCards(catalogo);
  }catch(e){
    document.getElementById('cards-grid').innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Erro ao carregar</h3><p>Verifique sua conexão.</p></div>';
  }
}

function renderCards(lista){
  var grid=document.getElementById('cards-grid');
  grid.innerHTML=lista.map(function(i){
    var fotos=toArr(i.fotos);
    var foto=fotos.length>0?otimizarFoto(fotos[i.destaquePhoto||0]||fotos[0]):null;
    var uid=i._uid||i.id||'';
    var titulo=i.titulo||'';
    var homeLink='https://fcostacorretor.com/?fcp='+encodeURIComponent(uid);
    var wppMsg=encodeURIComponent('Ola! Tenho interesse no catalogo '+(i.id||'')+' - '+titulo);
    var shareLink='https://fcostacorretor.com/fcp.html?uid='+encodeURIComponent(uid);
    var shareMsg=encodeURIComponent('FCP '+(i.id||'')+' - '+titulo+(i.preco?'\nR$ '+i.preco:'')+'\n\n'+shareLink+'\n\nFCosta Corretor - CRECI-SP 294791-F');
    return '<div class="card" data-uid="'+esc(uid)+'" data-titulo="'+esc(titulo)+'">'
      +'<div class="card-imagem">'
      +'<div class="card-badge">FCP</div>'
      +(foto?'<img src="'+foto+'" alt="'+esc(titulo)+'" loading="lazy">':'<div class="card-icone"><i class="fas fa-book-open"></i></div>')
      +(fotos.length>1?'<div style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;"><i class="fas fa-images"></i> '+fotos.length+'</div>':'')
      +'</div>'
      +'<div class="card-body">'
      +'<div class="card-sigla">'+esc(i.id||'')+'</div>'
      +'<div class="card-titulo">'+esc(titulo)+'</div>'
      +(i.preco?'<div class="card-preco">R$ '+esc(i.preco)+'</div>':'')
      +'<div class="card-buttons">'
      +'<button class="btn-card btn-ver" onclick="irParaHome(\''+encodeURIComponent(uid)+'\')"><i class="fas fa-home"></i> Ver na Home</button>'
      +'<button class="btn-card btn-wpp-card" onclick="window.open(\'https://wa.me/5511993509109?text='+wppMsg+'\',\'_blank\')"><i class="fab fa-whatsapp"></i> WhatsApp</button>'
      +'<button class="btn-card btn-share" onclick="compartilhar(\''+shareMsg+'\',\''+shareLink+'\')" title="Compartilhar"><i class="fas fa-share-alt"></i></button>'
      +'</div></div></div>';
  }).join('');

  // Destaque: ?titulo= (vindo do modal FCL) ou ?uid= (vindo da home)
  var params=new URLSearchParams(window.location.search);
  var tituloParam=params.get('titulo');
  var uidParam=params.get('uid');
  var alvo=null;

  if(tituloParam){
    var cards=grid.querySelectorAll('.card');
    for(var j=0;j<cards.length;j++){
      if((cards[j].getAttribute('data-titulo')||'').trim()===tituloParam.trim()){
        alvo=cards[j];break;
      }
    }
  } else if(uidParam){
    alvo=grid.querySelector('[data-uid="'+uidParam+'"]');
  }

  if(alvo){
    setTimeout(function(){
      alvo.scrollIntoView({behavior:'smooth',block:'center'});
      alvo.style.transition='box-shadow 0.4s,transform 0.4s';
      alvo.style.boxShadow='0 0 0 4px #f59e0b,0 16px 48px rgba(245,158,11,0.45)';
      alvo.style.transform='scale(1.04)';
      setTimeout(function(){alvo.style.boxShadow='';alvo.style.transform='';},2500);
    },300);
  }
}

function irParaHome(uid){
  window.location.href='https://fcostacorretor.com/?fcp='+uid;
}

function mostrarVazio(){
  document.getElementById('cards-grid').innerHTML='<div class="empty-state"><i class="fas fa-book-open"></i><h3>Nenhum catalogo disponivel</h3><p>Em breve novos materiais serao publicados.</p><br><a href="https://wa.me/5511993509109" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:#25d366;color:#fff;text-decoration:none;border-radius:8px;padding:12px 20px;font-weight:700;"><i class="fab fa-whatsapp"></i> Falar com FCosta</a></div>';
}

function compartilhar(msg,url){
  if(_isMobile&&navigator.share){
    navigator.share({title:'FCosta Corretor',text:decodeURIComponent(msg),url:url}).catch(function(){window.open('https://wa.me/?text='+msg,'_blank');});
  } else {
    window.open('https://wa.me/?text='+msg,'_blank');
  }
}

carregarCatalogo();
</script>
</body>
</html>
