<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --azul:#003da5;--azul-escuro:#002580;--vermelho:#dc1c2d;--verde:#16a34a;
  --branco:#ffffff;--cinza-claro:#f4f6fa;--cinza-meio:#888;
  --cinza-escuro:#2a2a2a;--preto:#0d1829;--borda:#e2e8f0;
  --sombra:0 4px 24px rgba(0,61,165,0.10);
}
html,body{font-family:'DM Sans',sans-serif;background:var(--cinza-claro);color:var(--cinza-escuro);overflow-x:hidden;width:100%;max-width:100vw;}
header{background:var(--azul);border-bottom:3px solid var(--verde);padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,61,165,.3);}
.navbar{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;height:64px;gap:12px;}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-wrap img{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);object-fit:cover;flex-shrink:0;}
.logo-nome{font-family:'Playfair Display',serif;font-size:18px;font-weight:800;color:#fff;line-height:1;}
.logo-creci{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;}
.nav-links{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.nav-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;border:none;font-family:'DM Sans',sans-serif;}
.nav-btn.ghost{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;}
.nav-btn.ghost:hover{background:rgba(255,255,255,.22);}
.nav-btn.wpp{background:#25d366;color:#fff;}
.nav-btn.wpp:hover{background:#1da852;}
.nav-btn.ativo{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);color:#fff;font-weight:700;}
@media(max-width:600px){.logo-nome{font-size:16px;}.logo-creci{display:none;}.nav-btn span{display:none;}.nav-btn{padding:8px 10px;}}
.hero{background:linear-gradient(135deg,#15803d 0%,#166534 100%);color:#fff;padding:48px 20px 40px;text-align:center;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,44px);font-weight:800;margin-bottom:10px;line-height:1.2;}
.hero p{font-size:15px;opacity:.85;}
.container{max-width:1200px;margin:0 auto;padding:32px 16px 60px;}
.busca-wrap{background:#fff;border-radius:12px;padding:16px;box-shadow:var(--sombra);margin-bottom:28px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.busca-input{flex:1;min-width:200px;padding:10px 14px;border:1.5px solid var(--borda);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.busca-input:focus{border-color:var(--verde);}
.busca-btn{padding:10px 20px;background:var(--verde);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.resultado-count{font-size:13px;color:var(--cinza-meio);width:100%;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--sombra);transition:all .3s;cursor:pointer;}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(22,163,74,.16);}
.card-badge{position:absolute;top:12px;left:12px;background:var(--verde);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1px;z-index:1;}
.card-imagem{width:100%;height:210px;background:var(--cinza-claro);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;}
.card-imagem img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.card:hover .card-imagem img{transform:scale(1.05);}
.card-body{padding:18px;}
.card-sigla{font-size:11px;color:var(--cinza-meio);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.card-titulo{font-size:15px;font-weight:700;color:var(--cinza-escuro);margin-bottom:6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-local{font-size:12px;color:var(--cinza-meio);margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.card-preco{font-size:18px;color:var(--verde);font-weight:700;margin-bottom:12px;}
.card-buttons{display:flex;gap:8px;}
.btn-card{flex:1;padding:9px 8px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:12px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'DM Sans',sans-serif;}
.btn-wpp-card{background:#25d366;color:#fff;}.btn-wpp-card:hover{background:#1da852;}
.btn-det-card{background:var(--verde);color:#fff;}.btn-det-card:hover{background:#15803d;}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--cinza-meio);}
.empty-state i{font-size:56px;display:block;margin-bottom:16px;opacity:.3;}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--cinza-escuro);}
.skeleton{background:#e2e8f0;border-radius:14px;overflow:hidden;}
.skeleton-img{width:100%;height:210px;background:linear-gradient(90deg,#e2e8f0 25%,#f4f6fa 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
.skeleton-body{padding:18px;}
.skeleton-line{height:12px;border-radius:6px;margin-bottom:10px;background:linear-gradient(90deg,#e2e8f0 25%,#f4f6fa 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
.skeleton-line.w60{width:60%;}.skeleton-line.w80{width:80%;}.skeleton-line.w40{width:40%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
footer{background:var(--preto);color:#fff;padding:28px 20px;}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
.footer-copy{font-size:12px;color:rgba(255,255,255,.45);}
.footer-links{display:flex;gap:20px;flex-wrap:wrap;}
.footer-links a{font-size:12px;color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s;}
.footer-links a:hover{color:#fff;}
.btn-voltar{display:inline-flex;align-items:center;gap:8px;background:var(--azul);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;transition:all .2s;}
.btn-voltar:hover{background:var(--azul-escuro);}
</style>
</head>
<body>

      <div><div class="logo-nome">FCosta Corretor</div><div class="logo-creci">CRECI-SP 294791-F</div></div>
    </a>
    <div class="nav-links">
      <a class="nav-btn ghost" href="https://fcostacorretor.com"><i class="fas fa-home"></i><span> Home</span></a>
      <a class="nav-btn ghost" href="https://fcostacorretor.com/comprar"><i class="fas fa-home"></i><span> Comprar</span></a>
      <a class="nav-btn ativo" href="#"><i class="fas fa-key"></i><span> Alugar</span></a>
      <a class="nav-btn ghost" href="https://fcostacorretor.com/lancamentos"><i class="fas fa-building"></i><span> Lançamentos</span></a>
      <a class="nav-btn wpp" href="https://wa.me/5511993509109?text=Ol%C3%A1!%20Tenho%20interesse%20em%20im%C3%B3veis%20para%20aluguel." target="_blank" rel="noopener noreferrer"><i class="fab fa-whatsapp"></i><span> WhatsApp</span></a>
    </div>
  </div>
</header>
<section class="hero">
  <h1><i class="fas fa-key" style="font-size:.8em;opacity:.8;"></i> Imóveis para Aluguel</h1>
  <p>Encontre o imóvel ideal para morar em São Paulo · Zona Leste · Itaim Paulista</p>
</section>
<div class="container">
  <div class="busca-wrap">
    <input type="text" class="busca-input" id="busca-input" placeholder="🔍 Buscar por título, bairro ou preço…" oninput="filtrar()">
    <button class="busca-btn" onclick="filtrar()"><i class="fas fa-search"></i> Buscar</button>
    <div class="resultado-count" id="resultado-count"></div>
  </div>
  <div class="cards-grid" id="cards-grid">
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div></div>
  </div>
</div>
<footer>
  <div class="footer-inner">
    <a class="btn-voltar" href="https://fcostacorretor.com"><i class="fas fa-arrow-left"></i> Voltar à Home</a>
    <span class="footer-copy">© 2026 FCosta Corretor — CRECI-SP 294791-F</span>
    <div class="footer-links">
      <a href="https://fcostacorretor.com/politica-de-privacidade" target="_blank" rel="noopener noreferrer"><i class="fas fa-shield-alt"></i> Privacidade</a>
      <a href="https://fcostacorretor.com/condicoes-de-uso" target="_blank" rel="noopener noreferrer"><i class="fas fa-file-alt"></i> Termos de Uso</a>
    </div>
  </div>
</footer>
<script>
var FB_URL='https://fcosta-31125-default-rtdb.firebaseio.com';
var todosImoveis=[];
function toArr(v){if(!v)return[];if(Array.isArray(v))return v.filter(Boolean);if(typeof v==='object')return Object.keys(v).sort(function(a,b){return Number(a)-Number(b);}).map(function(k){return v[k];}).filter(Boolean);return[];}
function otimizarFoto(url){if(!url)return null;if(url.includes('cloudinary.com'))return url.replace('/upload/','/upload/w_400,q_auto,f_auto/');return url;}
async function carregarImoveis(){
  try{
    var r=await fetch(FB_URL+'/fcosta_imoveis.json');var d=await r.json();
    if(!d){mostrarVazio();return;}
    var lista=Array.isArray(d)?d.filter(Boolean):Object.entries(d).filter(function(e){return e[1];}).map(function(e){return Object.assign({},e[1],{_uid:e[1]._uid||e[0]});});
    todosImoveis=lista.filter(function(i){return(i.sigla||'').toUpperCase()==='FCA';});
    renderCards(todosImoveis);
  }catch(e){document.getElementById('cards-grid').innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Erro ao carregar</h3><p>Verifique sua conexão.</p></div>';}
}
function renderCards(lista){
  var grid=document.getElementById('cards-grid');
  document.getElementById('resultado-count').textContent=lista.length+' imóvel(is) encontrado(s)';
  if(!lista.length){mostrarVazio();return;}
  grid.innerHTML=lista.map(function(i){
    var fotos=toArr(i.fotos);var foto=fotos.length>0?otimizarFoto(fotos[i.destaquePhoto||0]||fotos[0]):null;
    var uid=i._uid||i.id||'';var link='https://fcostacorretor.com/?imovel='+encodeURIComponent(uid);
    return '<div class="card" onclick="window.location.href=\''+link+'\'">'
      +'<div class="card-imagem"><div class="card-badge">FCA</div>'+(foto?'<img src="'+foto+'" alt="'+esc(i.titulo)+'" loading="lazy">':'<i class="fas fa-key" style="color:#ccc"></i>')
      +(fotos.length>1?'<div style="position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.6);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;"><i class="fas fa-images"></i> '+fotos.length+'</div>':'')
      +'</div><div class="card-body"><div class="card-sigla">'+esc(i.id||'')+'</div><div class="card-titulo">'+esc(i.titulo||'')+'</div>'
      +(i.local?'<div class="card-local"><i class="fas fa-map-marker-alt" style="color:var(--verde)"></i> '+esc(i.local)+'</div>':'')
      +(i.preco?'<div class="card-preco">R$ '+esc(i.preco)+'</div>':'')
      +'<div class="card-buttons">'
      +'<button class="btn-card btn-det-card" onclick="event.stopPropagation();window.location.href=\''+link+'\'"><i class="fas fa-info-circle"></i> Detalhes</button>'
      +'<button class="btn-card btn-wpp-card" onclick="event.stopPropagation();window.open(\'https://wa.me/5511993509109?text='+encodeURIComponent('Olá! Tenho interesse no imóvel '+(i.id||'')+' — '+(i.titulo||''))+'\'  ,\'_blank\')"><i class="fab fa-whatsapp"></i> WhatsApp</button>'
      +'</div></div></div>';
  }).join('');
}
function mostrarVazio(){
  document.getElementById('cards-grid').innerHTML='<div class="empty-state"><i class="fas fa-key"></i><h3>Nenhum imóvel disponível</h3><p>Em breve novos imóveis serão publicados.</p><br><a href="https://wa.me/5511993509109" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:#25d366;color:#fff;text-decoration:none;border-radius:8px;padding:12px 20px;font-weight:700;"><i class="fab fa-whatsapp"></i> Falar com FCosta</a></div>';
  document.getElementById('resultado-count').textContent='0 imóveis';
}
function filtrar(){var q=(document.getElementById('busca-input').value||'').toLowerCase().trim();if(!q){renderCards(todosImoveis);return;}var f=todosImoveis.filter(function(i){return(i.titulo||'').toLowerCase().includes(q)||(i.local||'').toLowerCase().includes(q)||(i.preco||'').toLowerCase().includes(q)||(i.id||'').toLowerCase().includes(q);});renderCards(f);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
carregarImoveis();
</script>
</body>
