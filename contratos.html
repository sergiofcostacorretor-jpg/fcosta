<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCOSTA - Sistema de Gestão Imobiliária e Jurídica</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --ouro: #C9A84C;
  --ouro-claro: #e8c96a;
  --azul: #0a1628;
  --azul-medio: #112240;
  --texto: #1a1a1a;
  --cinza-lei: #4a5568;
  --borda: #d4c4a0;
  --fundo-lei: #faf8f3;
  --vermelho: #c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;font-family:'EB Garamond',Georgia,serif;font-size:12pt;color:var(--texto);line-height:1.7;}

/* ===== TOOLBAR ===== */
.toolbar{
  background:var(--azul);
  padding:8px 20px;
  position:fixed;width:100%;top:0;z-index:9999;
  display:flex;align-items:center;gap:10px;
  border-bottom:3px solid var(--ouro);
  flex-wrap:wrap;
}
.btn-home{
  background:var(--ouro);color:var(--azul);
  padding:7px 14px;border-radius:3px;text-decoration:none;
  font-weight:700;font-family:'Oswald',sans-serif;font-size:9.5pt;
  letter-spacing:.5px;white-space:nowrap;
  transition:background .2s;
}
.btn-home:hover{background:var(--ouro-claro);}
.toolbar select{
  padding:7px 10px;font-size:9.5pt;
  border:1px solid var(--ouro);border-radius:3px;
  min-width:280px;font-family:'Oswald',sans-serif;
  background:var(--azul-medio);color:#fff;
}
.toolbar select option{background:var(--azul-medio);color:#fff;}
.btn-toolbar{
  padding:7px 14px;cursor:pointer;
  font-weight:700;font-family:'Oswald',sans-serif;font-size:9pt;
  border:1.5px solid var(--ouro);border-radius:3px;
  background:transparent;color:var(--ouro);
  white-space:nowrap;transition:all .2s;letter-spacing:.4px;
}
.btn-toolbar:hover{background:var(--ouro);color:var(--azul);}
.btn-toolbar.salvar{border-color:#27ae60;color:#27ae60;}
.btn-toolbar.salvar:hover{background:#27ae60;color:#fff;}
.btn-toolbar.pdf{border-color:#e74c3c;color:#e74c3c;}
.btn-toolbar.pdf:hover{background:#e74c3c;color:#fff;}

/* ===== PAINEL DE ARQUIVO ===== */
.arquivo-panel{
  position:fixed;right:0;top:55px;bottom:0;
  width:280px;background:var(--azul-medio);
  border-left:2px solid var(--ouro);
  overflow-y:auto;padding:15px;z-index:8000;
  transform:translateX(100%);transition:transform .3s;
}
.arquivo-panel.aberto{transform:translateX(0);}
.arquivo-panel h4{
  font-family:'Oswald',sans-serif;color:var(--ouro);
  font-size:12pt;letter-spacing:1px;margin-bottom:10px;
  border-bottom:1px solid var(--ouro);padding-bottom:6px;
}
.arquivo-busca{
  width:100%;padding:7px;border:1px solid var(--ouro);
  border-radius:3px;background:#0d1b35;color:#fff;
  font-size:10pt;margin-bottom:10px;font-family:'EB Garamond',serif;
}
.arquivo-item{
  background:#0d1b35;border:1px solid #1e3a5f;
  border-radius:4px;padding:8px 10px;margin-bottom:6px;
  cursor:pointer;transition:border-color .2s;
}
.arquivo-item:hover{border-color:var(--ouro);}
.arquivo-item .nome{color:#e8e8e8;font-size:10pt;font-weight:600;}
.arquivo-item .meta{color:#aaa;font-size:8.5pt;margin-top:2px;}
.arquivo-item .tipo-badge{
  display:inline-block;background:var(--ouro);color:var(--azul);
  font-size:7pt;font-family:'Oswald',sans-serif;padding:1px 5px;
  border-radius:2px;margin-right:4px;letter-spacing:.3px;
}
.arquivo-item .del-btn{
  float:right;color:#e74c3c;background:none;border:none;
  cursor:pointer;font-size:14px;line-height:1;
}
.arquivo-vazio{color:#888;font-size:10pt;text-align:center;padding:20px 0;}

/* ===== TOGGLE ARQUIVO ===== */
.toggle-arquivo{
  position:fixed;right:280px;top:50%;transform:translateY(-50%);
  background:var(--azul);border:2px solid var(--ouro);
  color:var(--ouro);padding:8px 5px;border-radius:4px 0 0 4px;
  cursor:pointer;z-index:8001;writing-mode:vertical-rl;
  font-family:'Oswald',sans-serif;font-size:9pt;letter-spacing:1px;
  transition:right .3s;
}
.toggle-arquivo.fechado{right:0;}

/* ===== A4 ===== */
.document-container{padding-top:65px;padding-bottom:50px;padding-right:295px;}
.a4-page{
  width:210mm;min-height:297mm;
  margin:20px auto;background:#fff;
  padding:22mm 25mm 28mm;
  box-shadow:0 8px 40px rgba(0,0,0,0.6);
  box-sizing:border-box;position:relative;
}

/* ===== CAMPOS EDITÁVEIS ===== */
input.campo-edit,textarea.campo-edit{
  font-weight:700!important;color:#000;
  border:none;border-bottom:1.5px dashed var(--ouro);
  background:#fffdf5;font-size:11.5pt;
  font-family:'EB Garamond',serif;outline:none;
  transition:border-color .2s,background .2s;padding:0 2px;
}
input.campo-edit:focus,textarea.campo-edit:focus{
  border-bottom-color:#1a6b3c;background:#f0fff4;
}

/* ===== TIPOGRAFIA JURÍDICA ===== */
h2.titulo-contrato{
  font-family:'Oswald',sans-serif;
  text-align:center;text-transform:uppercase;
  font-size:15pt;margin-bottom:8px;
  color:var(--azul);letter-spacing:1.5px;
  border-bottom:2.5px solid var(--azul);
  padding-bottom:10px;
}
.subtitulo-contrato{
  text-align:center;font-size:9.5pt;color:#555;
  margin-bottom:20px;font-style:italic;
}
h3.clausula-titulo{
  font-family:'Oswald',sans-serif;font-size:10.5pt;
  color:#fff;text-transform:uppercase;
  background:var(--azul);padding:6px 12px;
  margin:18px 0 0 0;letter-spacing:.8px;
}
p.clausula-texto{
  text-align:justify;margin:0;
  padding:10px 12px 6px;
  font-size:11.5pt;line-height:1.75;
  border-left:3px solid var(--borda);
  border-right:3px solid var(--borda);
  border-bottom:1px solid #ece8df;
  background:#fefefe;
}

/* ===== BLOCO DE LEI ===== */
.lei-bloco{
  background:var(--fundo-lei);
  border-left:4px solid var(--ouro);
  border-bottom:1px solid var(--borda);
  border-right:1px solid var(--borda);
  padding:8px 12px 10px 14px;
  margin-bottom:4px;
}
.lei-bloco .lei-header{
  font-family:'Oswald',sans-serif;font-size:8pt;
  color:var(--ouro);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:5px;
  display:flex;align-items:center;gap:6px;
}
.lei-bloco .lei-header::before{
  content:'§';font-size:11pt;color:var(--ouro);font-weight:700;
}
.lei-item{
  font-size:8.5pt;color:var(--cinza-lei);
  font-style:italic;margin-bottom:5px;
  padding-left:8px;border-left:1px solid var(--borda);
  line-height:1.5;
}
.lei-item strong{color:#2c3e50;font-style:normal;}
.lei-item:last-child{margin-bottom:0;}

/* ===== CABEÇALHO ===== */
.header-fcosta{
  display:flex;align-items:center;gap:18px;
  border-bottom:4px double var(--ouro);
  padding-bottom:14px;margin-bottom:20px;
}
.logo-fcosta{width:80px;height:80px;border-radius:50%;border:2.5px solid var(--ouro);object-fit:cover;}
.header-info .marca{
  font-family:'Oswald',sans-serif;font-size:24pt;
  color:var(--azul);line-height:1;font-weight:700;
  letter-spacing:2px;
}
.header-info .subtag{font-size:9pt;font-weight:700;color:var(--ouro);letter-spacing:.8px;}
.header-info .creci{margin-top:4px;font-size:8.5pt;color:#555;}
.header-data{
  margin-left:auto;text-align:right;
  font-size:9pt;color:#777;font-style:italic;
}

/* ===== ASSINATURAS ===== */
.bloco-assinaturas{margin-top:45px;}
.assinaturas{
  display:flex;justify-content:space-around;
  text-align:center;gap:30px;margin-top:20px;
}
.assinatura-box{width:45%;}
.linha-ass{border-top:1.5px solid #000;margin-bottom:6px;padding-top:4px;}
.ass-nome{font-size:10pt;font-weight:700;}
.ass-qualif{font-size:9pt;color:#555;margin-top:2px;}
.local-data{text-align:center;margin-top:35px;font-size:11pt;}

/* ===== RECIBO ===== */
.recibo-frame{border:2px solid #000;padding:25px;margin-top:10px;position:relative;}
.valor-box{
  float:right;border:2.5px solid #000;padding:6px 18px;
  font-weight:700;font-size:16pt;background:#eee;
  font-family:'Oswald',sans-serif;
}

/* ===== PLACEHOLDER ===== */
.placeholder-msg{
  text-align:center;padding:80px 20px;color:#aaa;
  font-family:'Oswald',sans-serif;letter-spacing:1px;
}
.placeholder-msg .icon{font-size:48pt;margin-bottom:15px;opacity:.3;}

/* ===== MODAL ===== */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:99999;
  align-items:center;justify-content:center;
}
.modal-overlay.ativo{display:flex;}
.modal-box{
  background:#fff;border-radius:6px;padding:30px;
  max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.modal-box h4{font-family:'Oswald',sans-serif;color:var(--azul);font-size:14pt;margin-bottom:15px;}
.modal-box input{
  width:100%;padding:10px;border:1.5px solid #ccc;
  border-radius:4px;font-size:11pt;margin-bottom:10px;
  font-family:'EB Garamond',serif;
}
.modal-box input:focus{border-color:var(--ouro);outline:none;}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;}
.modal-btns button{
  padding:9px 20px;border-radius:4px;cursor:pointer;
  font-family:'Oswald',sans-serif;font-size:10pt;border:none;
}
.btn-cancelar{background:#eee;color:#555;}
.btn-confirmar{background:var(--azul);color:var(--ouro);}

/* ===== NOTIFICAÇÃO ===== */
.notif{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--azul);color:var(--ouro);
  padding:12px 25px;border-radius:4px;
  font-family:'Oswald',sans-serif;font-size:10.5pt;letter-spacing:.5px;
  border:1px solid var(--ouro);z-index:99999;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.notif.show{opacity:1;}

/* ===== IMPRESSÃO ===== */
@media print{
  .toolbar,.toggle-arquivo,.arquivo-panel,.no-print,.modal-overlay,.notif{display:none!important;}
  body{background:white;}
  .document-container{padding:0!important;}
  .a4-page{box-shadow:none;width:100%;margin:0;padding:15mm 20mm;}
  .lei-bloco{break-inside:avoid;}
  .clausula-titulo,.clausula-texto,.lei-bloco{break-inside:avoid;}
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <a href="https://fcostacorretor.com/" target="_blank" class="btn-home">🏠 FCOSTA</a>

  <select id="selectModel" onchange="gerarConteudo()">
    <option value="">— SELECIONE O DOCUMENTO —</option>
    <optgroup label="📋 LOCAÇÃO (LEI 8.245/91)">
      <option value="loc_residencial">Locação Residencial Completa (30 Meses)</option>
      <option value="loc_comercial">Locação Não Residencial / Comercial</option>
      <option value="loc_built_suit">Contrato Built-to-Suit (Art. 54-A)</option>
      <option value="loc_temporada">Locação por Temporada (Férias/Eventos)</option>
      <option value="comodato">Contrato de Comodato de Imóvel</option>
    </optgroup>
    <optgroup label="🤝 CORRETAGEM / INTERMEDIAÇÃO">
      <option value="exclusividade_venda">Autorização de Venda com Exclusividade</option>
      <option value="venda_sem_exclusividade">Autorização de Venda SEM Exclusividade</option>
      <option value="autorizacao_locacao">Autorização de Locação e Gestão</option>
    </optgroup>
    <optgroup label="🏠 COMPRA E VENDA">
      <option value="compra_venda">Compromisso de Compra e Venda de Imóvel</option>
    </optgroup>
    <optgroup label="🧾 RECIBOS">
      <option value="recibo_aluguel">Recibo de Aluguel (Cálculo Automático de Mora)</option>
      <option value="recibo_compras">Recibo de Compras Diversas - FCOSTA</option>
    </optgroup>
  </select>

  <button class="btn-toolbar salvar" onclick="abrirModalSalvar()">💾 SALVAR CONTRATO</button>
  <button class="btn-toolbar pdf" onclick="gerarPDF()">📄 BAIXAR PDF</button>
  <button class="btn-toolbar" onclick="window.print()">🖨️ IMPRIMIR</button>
  <button class="btn-toolbar" onclick="toggleArquivo()" style="border-color:#8e44ad;color:#8e44ad;" id="btnArquivo">📁 ARQUIVO (0)</button>
</div>

<!-- PAINEL DE ARQUIVO -->
<div class="arquivo-panel" id="arquivoPanel">
  <h4>📁 ARQUIVO DE CONTRATOS</h4>
  <input type="text" class="arquivo-busca" id="arquivoBusca" placeholder="🔍 Buscar por nome ou tipo..." oninput="renderArquivo()">
  <div id="arquivoLista"></div>
</div>
<div class="toggle-arquivo fechado" id="toggleArqBtn" onclick="toggleArquivo()">ARQUIVO</div>

<!-- CONTAINER PRINCIPAL -->
<div class="document-container" id="docContainer">
  <div class="a4-page" id="a4page">
    <header class="header-fcosta">
      <img src="https://i.postimg.cc/xTQzc3RV/495379823-122128221800669140-5238985291153506093-n-photoaidcom-cropped.png" class="logo-fcosta" alt="Logo FCOSTA">
      <div class="header-info">
        <div class="marca">FCOSTA</div>
        <div class="subtag">GESTÃO IMOBILIÁRIA &amp; CONSULTORIA JURÍDICA</div>
        <div class="creci"><strong>CRECI 294791-F | CNAI 52708</strong></div>
      </div>
      <div class="header-data" id="headerData"></div>
    </header>
    <div id="editor">
      <div class="placeholder-msg">
        <div class="icon">⚖️</div>
        <div>Selecione um modelo de documento<br>no menu superior para iniciar</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL SALVAR -->
<div class="modal-overlay" id="modalSalvar">
  <div class="modal-box">
    <h4>💾 Salvar Contrato no Arquivo</h4>
    <input type="text" id="modalNome" placeholder="Nome do cliente / contratante principal" maxlength="80">
    <input type="text" id="modalObs" placeholder="Observação (opcional, ex: Ap. 42 Centro)" maxlength="100">
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirmar" onclick="salvarContrato()">Salvar</button>
    </div>
  </div>
</div>

<!-- NOTIFICAÇÃO -->
<div class="notif" id="notif"></div>

<script>
// ============================================================
//  UTILITÁRIOS
// ============================================================
const hoje = () => new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
const hojeISO = () => new Date().toLocaleDateString('pt-BR');

let arquivoAberto = false;
let modeloAtual = '';

function mostrarNotif(msg, dur=3000){
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'), dur);
}

function toggleArquivo(){
  arquivoAberto = !arquivoAberto;
  document.getElementById('arquivoPanel').classList.toggle('aberto', arquivoAberto);
  document.getElementById('toggleArqBtn').classList.toggle('fechado', !arquivoAberto);
  document.getElementById('docContainer').style.paddingRight = arquivoAberto ? '295px' : '0';
}

// ============================================================
//  ARQUIVO LOCAL (localStorage)
// ============================================================
function getArquivo(){
  try { return JSON.parse(localStorage.getItem('fcosta_arquivo')||'[]'); }
  catch(e){ return []; }
}
function setArquivo(arr){ localStorage.setItem('fcosta_arquivo', JSON.stringify(arr)); }

function atualizarBotaoArquivo(){
  const arr = getArquivo();
  document.getElementById('btnArquivo').textContent = `📁 ARQUIVO (${arr.length})`;
}

function renderArquivo(){
  const busca = document.getElementById('arquivoBusca').value.toLowerCase();
  const arr = getArquivo().filter(c=>
    c.nome.toLowerCase().includes(busca) ||
    c.tipo.toLowerCase().includes(busca) ||
    (c.obs||'').toLowerCase().includes(busca)
  );
  const lista = document.getElementById('arquivoLista');
  if(!arr.length){
    lista.innerHTML='<div class="arquivo-vazio">Nenhum contrato encontrado.</div>';return;
  }
  lista.innerHTML = arr.slice().reverse().map((c,ri)=>{
    const i = getArquivo().length - 1 - ri;
    return `<div class="arquivo-item">
      <button class="del-btn" onclick="deletarContrato(${i})" title="Excluir">✕</button>
      <div class="nome"><span class="tipo-badge">${c.tipo}</span>${c.nome}</div>
      <div class="meta">${c.data}${c.obs?' — '+c.obs:''}</div>
      <div style="margin-top:6px;display:flex;gap:6px;">
        <button onclick="carregarContrato(${i})" style="flex:1;padding:4px;font-size:8pt;background:var(--ouro);color:var(--azul);border:none;border-radius:2px;cursor:pointer;font-family:'Oswald',sans-serif;">ABRIR</button>
      </div>
    </div>`;
  }).join('');
}

function abrirModalSalvar(){
  if(!modeloAtual){mostrarNotif('⚠️ Selecione e preencha um documento primeiro.');return;}
  document.getElementById('modalNome').value='';
  document.getElementById('modalObs').value='';
  document.getElementById('modalSalvar').classList.add('ativo');
  setTimeout(()=>document.getElementById('modalNome').focus(),100);
}
function fecharModal(){ document.getElementById('modalSalvar').classList.remove('ativo'); }

document.getElementById('modalSalvar').addEventListener('click', function(e){
  if(e.target===this) fecharModal();
});

function salvarContrato(){
  const nome = document.getElementById('modalNome').value.trim();
  if(!nome){ mostrarNotif('⚠️ Informe o nome do cliente.'); return; }
  const arr = getArquivo();
  const html = document.getElementById('editor').innerHTML;
  arr.push({
    id: Date.now(),
    nome, obs: document.getElementById('modalObs').value.trim(),
    tipo: nomeModelo(modeloAtual), modelo: modeloAtual,
    data: hojeISO(), html
  });
  setArquivo(arr);
  fecharModal();
  renderArquivo();
  atualizarBotaoArquivo();
  mostrarNotif(`✅ Contrato de "${nome}" salvo no arquivo!`);
}

function carregarContrato(i){
  const c = getArquivo()[i];
  if(!c) return;
  modeloAtual = c.modelo;
  document.getElementById('selectModel').value = c.modelo;
  document.getElementById('editor').innerHTML = c.html;
  document.getElementById('headerData').innerHTML =
    `<div>Data: ${c.data}</div><div>Cliente: <strong>${c.nome}</strong></div>`;
  if(c.modelo==='recibo_aluguel') setTimeout(calcularMoraAluguel,100);
  if(arquivoAberto) toggleArquivo();
  mostrarNotif(`📂 Contrato de "${c.nome}" carregado.`);
  window.scrollTo(0,0);
}

function deletarContrato(i){
  if(!confirm('Excluir este contrato do arquivo?')) return;
  const arr = getArquivo();
  arr.splice(i,1);
  setArquivo(arr);
  renderArquivo();
  atualizarBotaoArquivo();
  mostrarNotif('🗑️ Contrato excluído.');
}

function nomeModelo(m){
  const mapa = {
    loc_residencial:'LOC. RESIDENCIAL', loc_comercial:'LOC. COMERCIAL',
    loc_built_suit:'BUILT-TO-SUIT', loc_temporada:'LOC. TEMPORADA',
    comodato:'COMODATO', exclusividade_venda:'AUT. EXCLUSIVA',
    venda_sem_exclusividade:'AUT. SEM EXCL.', autorizacao_locacao:'AUT. LOCAÇÃO',
    compra_venda:'COMPRA E VENDA', recibo_aluguel:'RECIBO ALUGUEL',
    recibo_compras:'RECIBO COMPRAS'
  };
  return mapa[m]||m;
}

// ============================================================
//  PDF
// ============================================================
async function gerarPDF(){
  if(!modeloAtual){mostrarNotif('⚠️ Abra um documento primeiro.');return;}
  mostrarNotif('⏳ Gerando PDF, aguarde...',8000);
  const el = document.getElementById('a4page');
  try{
    const canvas = await html2canvas(el,{scale:2,useCORS:true,logging:false,
      backgroundColor:'#ffffff'});
    const imgData = canvas.toDataURL('image/jpeg',0.92);
    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const w=210, h=Math.round((canvas.height*210)/canvas.width);
    let y=0, pageH=297;
    while(y<h){
      if(y>0) pdf.addPage();
      pdf.addImage(imgData,'JPEG',0,-y,w,h,undefined,'FAST');
      y+=pageH;
    }
    const nome = (document.getElementById('modalNome')||{value:''}).value||'contrato';
    pdf.save(`FCOSTA_${nomeModelo(modeloAtual).replace(/\s/g,'_')}_${hojeISO().replace(/\//g,'-')}.pdf`);
    mostrarNotif('✅ PDF gerado com sucesso!');
  }catch(e){mostrarNotif('❌ Erro ao gerar PDF. Tente imprimir como PDF.');}
}

// ============================================================
//  CÁLCULO DE MORA
// ============================================================
function calcularMoraAluguel(){
  const elB=document.getElementById('v_base');
  const elD=document.getElementById('v_data');
  const elF=document.getElementById('v_final');
  const elDet=document.getElementById('detalhe_atraso');
  if(!elB||!elD||!elF||!elDet) return;
  const vb=parseFloat(elB.value)||0;
  const dv=new Date(elD.value+'T00:00:00');
  const dh=new Date(); dh.setHours(0,0,0,0);
  let multa=0,juros=0,dias=0;
  if(dh>dv&&vb>0){
    dias=Math.floor((dh-dv)/(864e5));
    multa=vb*0.10; juros=(vb*0.01/30)*dias;
  }
  const tot=vb+multa+juros;
  elF.innerText='R$ '+tot.toLocaleString('pt-BR',{minimumFractionDigits:2});
  elDet.innerHTML=dias>0
    ?`<span style="color:#c0392b">⚠️ Atraso: ${dias} dias | Multa 10%: R$ ${multa.toFixed(2)} | Juros 1%a.m. pro-rata: R$ ${juros.toFixed(2)}</span>`
    :`<span style="color:#27ae60">✅ Pagamento em dia</span>`;
}

function leiBloco(header, itens){
  return `<div class="lei-bloco">
    <div class="lei-header">${header}</div>
    ${itens.map(i=>`<div class="lei-item">${i}</div>`).join('')}
  </div>`;
}
function clausula(titulo, corpo, leis){
  return `<h3 class="clausula-titulo">${titulo}</h3>
<p class="clausula-texto">${corpo}</p>
${leis ? leiBloco('FUNDAMENTO LEGAL', leis) : ''}`;
}
function campo(w,val){return `<input class="campo-edit" style="width:${w}" value="${val}">`;}
function assinaturas(p1,p2,test=true){
  return `<div class="bloco-assinaturas">

${clausula('CLÁUSULA XI — DAS DISPOSIÇÕES GERAIS',
`(a) <strong>Comunicações:</strong> Todas as notificações, avisos e comunicações entre as partes deverão ser feitos por escrito, mediante e-mail com confirmação de leitura, aplicativo de mensagens com comprovante ou correspondência com aviso de recebimento. Os endereços eletrônicos das partes são: LOCADOR(A): ${campo('45%','e-mail do locador')}; LOCATÁRIO(A): ${campo('45%','e-mail do locatário')}.<br><br>
(b) <strong>Visitação:</strong> O LOCADOR(A) ou seu representante poderá vistoriar o imóvel, mediante aviso prévio de ${campo('8%','24')} horas, em dias úteis e em horário comercial, para verificar as condições de conservação.<br><br>
(c) <strong>Proibição de animais:</strong> ${campo('65%','É permitida / É vedada a manutenção de animais domésticos no imóvel, exceto de pequeno porte e mediante comunicação ao condomínio')}.<br><br>
(d) <strong>Número de moradores:</strong> O imóvel poderá abrigar, no máximo, ${campo('6%','0')} pessoas. Qualquer alteração significativa no número de moradores deverá ser comunicada ao LOCADOR(A).<br><br>
(e) <strong>Solidariedade:</strong> Havendo mais de um locatário, todos respondem solidariamente pelas obrigações deste contrato.`,
[
  '<strong>Art. 569 do Código Civil:</strong> O locatário é obrigado a servir-se da coisa alugada para os usos convencionados e a tratá-la com o mesmo cuidado como se sua fosse.',
  '<strong>Art. 264 do Código Civil:</strong> Há solidariedade quando, na mesma obrigação, concorre mais de um credor ou mais de um devedor, cada um com direito, ou obrigado, à dívida toda.'
])}

${clausula('CLÁUSULA XII — DO FORO E DA LEGISLAÇÃO APLICÁVEL',
`As partes elegem o foro da Comarca de <strong>${campo('30%','CIDADE/ESTADO')}</strong> para dirimir quaisquer litígios oriundos do presente contrato, renunciando a qualquer outro, por mais privilegiado que seja, inclusive o do domicílio de qualquer das partes.<br><br>
O presente contrato é regido pelas disposições da <strong>Lei nº 8.245/1991</strong> e, supletivamente, pelo <strong>Código Civil Brasileiro (Lei nº 10.406/2002)</strong> e demais normas legais aplicáveis.<br><br>
Firmado em ${campo('8%','2')} (${campo('20%','duas')}) vias de igual teor e forma, na presença das testemunhas abaixo.`,
[
  '<strong>Art. 58, II, da Lei 8.245/91:</strong> Nas ações de despejo, consignação em pagamento de aluguel e acessórios da locação, revisionais de aluguel e renovatórias de locação, observar-se-á o seguinte: II — é competente para conhecer e julgar tais ações o foro do lugar da situação do imóvel.',
  '<strong>Art. 78 do Código de Processo Civil (Lei 13.105/2015):</strong> Além das cláusulas que as partes podem incluir no contrato, é lícito estipular, previamente e por escrito, o foro onde será proposta eventual ação oriunda de direitos e obrigações.'
])}

${assinaturas('LOCADOR(A)','LOCATÁRIO(A)')}`,

// ─── LOCAÇÃO COMERCIAL ────────────────────────────────────
loc_comercial: ()=>`
<h2 class="titulo-contrato">Contrato de Locação Não Residencial (Comercial)</h2>
<p class="subtitulo-contrato">Instrumento Particular de Locação para Fins Não Residenciais — Lei nº 8.245/1991, Art. 51 e seguintes</p>
${leiBloco('BASE LEGAL GERAL',[
  '<strong>Lei nº 8.245/1991, Art. 51:</strong> Nas locações de imóveis destinados ao comércio, o locatário terá direito a renovação do contrato, por igual prazo, desde que: I — o contrato seja escrito e com prazo determinado; II — o prazo mínimo do contrato a renovar ou a soma dos prazos ininterruptos dos contratos escritos seja de cinco anos; III — o locatário esteja explorando seu comércio, no mesmo ramo, pelo prazo mínimo e ininterrupto de três anos.',
  '<strong>Art. 565 do Código Civil:</strong> A locação de coisas é o contrato pelo qual uma das partes se obriga a ceder à outra, por tempo determinado ou não, o uso e gozo de coisa não fungível, mediante certa retribuição.'
])}

${clausula('CLÁUSULA I — DAS PARTES CONTRATANTES',
`<strong>LOCADOR(A):</strong> ${campo('70%','NOME COMPLETO OU RAZÃO SOCIAL DO LOCADOR')}, inscrito(a) no CPF/CNPJ sob o nº ${campo('30%','000.000.000-00 / 00.000.000/0001-00')}, RG/IE nº ${campo('22%','00.000.000-0')}, residente/sediado(a) em ${campo('60%','ENDEREÇO COMPLETO DO LOCADOR/SEDE')}, doravante denominado(a) <strong>LOCADOR(A)</strong>.<br><br>
<strong>LOCATÁRIO(A):</strong> ${campo('70%','NOME COMPLETO OU RAZÃO SOCIAL DO LOCATÁRIO')}, inscrito(a) no CPF/CNPJ sob o nº ${campo('30%','000.000.000-00 / 00.000.000/0001-00')}, RG/IE nº ${campo('22%','00.000.000-0')}, residente/sediado(a) em ${campo('60%','ENDEREÇO COMPLETO DO LOCATÁRIO/SEDE')}, doravante denominado(a) <strong>LOCATÁRIO(A)</strong>.<br><br>
<strong>SÓCIOS/RESPONSÁVEIS SOLIDÁRIOS (se pessoa jurídica):</strong> ${campo('80%','Nome completo, CPF, cargo — responsáveis solidários pelas obrigações da PJ locatária')}.`,
[
  '<strong>Art. 1º da Lei 8.245/91:</strong> A locação de imóvel urbano regula-se pelo disposto nesta lei.',
  '<strong>Art. 104 do Código Civil:</strong> A validade do negócio jurídico requer agente capaz, objeto lícito, possível, determinado ou determinável, e forma prescrita ou não defesa em lei.',
  '<strong>Art. 265 do Código Civil:</strong> A solidariedade não se presume; resulta da lei ou da vontade das partes.'
])}

${clausula('CLÁUSULA II — DO OBJETO, FINALIDADE E RAMO DE ATIVIDADE',
`O objeto da presente locação é o imóvel <strong>${campo('28%','SALA / LOJA / GALPÃO / OUTRO')}</strong>, situado na ${campo('70%','LOGRADOURO COMPLETO, Nº, COMPLEMENTO, BAIRRO, CIDADE, ESTADO, CEP')}, com área de ${campo('10%','00,00')} m², registrado sob Matrícula nº ${campo('14%','XXXXX')} no CRI de ${campo('22%','CIDADE/COMARCA')}.<br><br>
O imóvel destina-se <strong>exclusivamente</strong> ao exercício da atividade de <strong>${campo('55%','DESCRIÇÃO DETALHADA DA ATIVIDADE COMERCIAL, CNAE, etc.')}</strong>, operada sob o CNPJ/CPF nº ${campo('25%','00.000.000/0001-00')}, sendo vedada qualquer alteração de finalidade sem anuência prévia e escrita do LOCADOR(A).<br><br>
A alteração do ramo de atividade, sem autorização, poderá implicar rescisão do contrato e perda do direito à renovatória compulsória.`,
[
  '<strong>Art. 51, III, da Lei 8.245/91:</strong> Para o direito à renovação, exige-se que o locatário esteja explorando seu comércio, no mesmo ramo, pelo prazo mínimo e ininterrupto de três anos.',
  '<strong>Art. 23, I, da Lei 8.245/91:</strong> O locatário é obrigado a usar o imóvel para o uso convencionado ou presumido, compatível com a natureza deste e com o fim a que se destina.'
])}

${clausula('CLÁUSULA III — DO PRAZO E DO DIREITO À RENOVAÇÃO',
`O prazo da locação é de <strong>${campo('18%','60 (sessenta)')} meses</strong>, com início em ${campo('22%','01/01/2026')} e término em ${campo('22%','01/01/2031')}.<br><br>
<strong>Do direito à renovação compulsória:</strong> O LOCATÁRIO(A) terá direito à renovação do contrato, pelo mesmo prazo, desde que cumpridos os requisitos do art. 51 da Lei 8.245/91: (a) contrato por escrito com prazo determinado; (b) soma de prazos ininterruptos de contratos escritos de, no mínimo, 5 (cinco) anos; (c) exploração do mesmo ramo de atividade por, no mínimo, 3 (três) anos ininterruptos. A ação renovatória deverá ser proposta entre 1 (um) ano e 6 (seis) meses antes do vencimento do contrato.<br><br>
<strong>Da retomada pelo locador:</strong> O LOCADOR(A) poderá se opor à renovação para uso próprio, reforma substancial que altere a estrutura do imóvel, ou proposta de terceiro com condições mais favoráveis, nos termos dos arts. 52 e 72 da Lei 8.245/91.`,
[
  '<strong>Art. 51 da Lei 8.245/91:</strong> Direito do locatário comercial à renovação compulsória do contrato, cumpridos os requisitos legais.',
  '<strong>Art. 71 da Lei 8.245/91:</strong> Alega-se, na ação renovatória, além dos fatos e fundamentos do pedido, o cumprimento dos requisitos do art. 51.',
  '<strong>Art. 52 da Lei 8.245/91:</strong> O locador não estará obrigado a renovar o contrato se: I — por determinação do Poder Público, tiver que realizar no imóvel obras que importarem na sua radical transformação; ou para fazer modificações de tal natureza que aumente o valor do negócio ou da propriedade; II — o imóvel vier a ser utilizado por ele próprio ou para transferência de fundo de comércio existente há mais de um ano, sendo detentor da maioria do capital o locador, seu cônjuge, ascendente ou descendente.'
])}

${clausula('CLÁUSULA IV — DO ALUGUEL, REAJUSTE E PENALIDADES DE MORA',
`O aluguel mensal é de <strong>R$ ${campo('22%','0.000,00')} (${campo('55%','valor por extenso')})</strong>, a ser pago até o dia <strong>${campo('5%','05')}</strong> de cada mês subsequente ao vencido, no endereço ou conta ${campo('45%','dados bancários/PIX do locador')}.<br><br>
<strong>Reajuste anual:</strong> O aluguel será reajustado anualmente pelo <strong>${campo('22%','IGP-M/FGV')}</strong>, ou pelo índice oficial que vier a substituí-lo.<br><br>
<strong>Revisão do aluguel:</strong> Transcorridos 3 (três) anos de vigência do contrato ou da última revisão judicial, qualquer das partes poderá pleitear revisão do aluguel para ajustá-lo ao preço de mercado, nos termos do art. 19 da Lei 8.245/91.<br><br>
<strong>Mora e penalidades:</strong> O não pagamento no prazo implicará multa de <strong>10% (dez por cento)</strong>, juros de mora de <strong>1% (um por cento) ao mês</strong> pro rata die e correção monetária pelo IGP-M, sem prejuízo de protesto e das demais medidas legais cabíveis.`,
[
  '<strong>Art. 17 e 18 da Lei 8.245/91:</strong> É livre a convenção do aluguel, vedada sua estipulação em moeda estrangeira. As partes poderão fixar índice de reajuste anual.',
  '<strong>Art. 19 da Lei 8.245/91:</strong> Não havendo acordo, o locador ou locatário, após três anos de vigência do contrato ou do acordo anteriormente realizado, poderá pedir revisão judicial do aluguel, a fim de ajustá-lo ao preço de mercado.',
  '<strong>Art. 395 do Código Civil:</strong> Responde o devedor pelos prejuízos a que sua mora der causa, mais juros, atualização monetária e honorários de advogado.'
])}

${clausula('CLÁUSULA V — DOS ENCARGOS E DESPESAS',
`Correrão por conta exclusiva do <strong>LOCATÁRIO(A)</strong>:<br>
(a) IPTU e quaisquer tributos que incidam sobre o imóvel e seu uso;<br>
(b) Taxas condominiais — ordinárias e extraordinárias relacionadas ao uso e funcionamento;<br>
(c) Consumo de água, energia elétrica, gás, internet, telefone e demais utilidades;<br>
(d) <strong>Seguro contra incêndio e riscos correlatos</strong> do imóvel, com apólice a favor do LOCADOR(A), com valor mínimo de R$ ${campo('18%','000.000,00')}, devendo apresentar comprovação anual;<br>
(e) Taxas de publicidade, fachada, alvará de funcionamento e licenças municipais;<br>
(f) Manutenção e conservação dos sistemas internos (ar-condicionado, exaustores, equipamentos fixos).`,
[
  '<strong>Art. 23, VIII, da Lei 8.245/91:</strong> O locatário é obrigado a pagar as despesas de consumo e as despesas ordinárias de condomínio.',
  '<strong>Art. 54-A, caput, da Lei 8.245/91:</strong> Em contratos não residenciais, as partes podem livremente pactuar as responsabilidades pelos encargos, diferentemente das normas gerais.'
])}

${clausula('CLÁUSULA VI — DAS BENFEITORIAS E ADAPTAÇÕES',
`<strong>Adaptações iniciais:</strong> As obras de adaptação do imóvel para o exercício da atividade do LOCATÁRIO(A) deverão ser previamente autorizadas por escrito pelo LOCADOR(A) e, se autorizadas, correrão por conta do LOCATÁRIO(A), incorporando-se ao imóvel sem direito a indenização ao final da locação, salvo pactuação diversa em instrumento apartado.<br><br>
<strong>Benfeitorias:</strong> Todas as benfeitorias realizadas pelo LOCATÁRIO(A) — necessárias, úteis ou voluptuárias — incorporar-se-ão ao imóvel ao término da locação, sem direito a retenção ou indenização, salvo expressa autorização escrita em contrário do LOCADOR(A).<br><br>
<strong>Obrigação de restauração:</strong> Ao término da locação, o LOCATÁRIO(A) deverá restaurar o imóvel ao estado original constante da vistoria de entrada, salvo acordo diverso firmado com o LOCADOR(A).`,
[
  '<strong>Art. 35 da Lei 8.245/91:</strong> Salvo disposição contratual em contrário, as benfeitorias necessárias introduzidas pelo locatário são indenizáveis e permitem o exercício do direito de retenção; as úteis, se autorizadas. As voluptuárias não são indenizáveis.',
  '<strong>Art. 23, III, da Lei 8.245/91:</strong> O locatário é obrigado a restituir o imóvel no estado em que o recebeu, salvo as deteriorações decorrentes do uso normal.'
])}

${clausula('CLÁUSULA VII — DA RESCISÃO E PENALIDADES',
`A rescisão antecipada por iniciativa do LOCATÁRIO(A) implicará pagamento de multa equivalente a <strong>3 (três) aluguéis vigentes</strong>, calculada proporcionalmente ao tempo restante. O descumprimento de qualquer obrigação legal ou contratual autorizará o LOCADOR(A) a ajuizar ação de despejo por infração, com cobrança cumulada da multa e perdas e danos.<br><br>
<strong>Perdas do direito à renovatória:</strong> A infração contratual grave implica a perda do direito à renovação compulsória, independentemente do prazo de vigência.`,
[
  '<strong>Art. 4º da Lei 8.245/91:</strong> O locatário pode devolver o imóvel antes do prazo, pagando a multa pactuada.',
  '<strong>Art. 9º, II, da Lei 8.245/91:</strong> A locação pode ser desfeita em decorrência de prática de infração legal ou contratual.'
])}

${clausula('CLÁUSULA VIII — DA GARANTIA',
`O presente contrato é garantido por <strong>${campo('45%','Caução / Fiança / Seguro Fiança / Título de Capitalização')}</strong>, nos termos do art. 37 da Lei 8.245/91, conforme instrumento e condições específicas em documento apartado que constitui <strong>Anexo II</strong> deste contrato.`,
[
  '<strong>Art. 37 da Lei 8.245/91:</strong> No contrato de locação, pode o locador exigir as modalidades de garantia previstas nos incisos I a IV. É vedada mais de uma modalidade de garantia no mesmo contrato.'
])}

${clausula('CLÁUSULA IX — DO FORO',
`As partes elegem o foro da Comarca de <strong>${campo('30%','CIDADE/ESTADO')}</strong> para dirimir quaisquer litígios, renunciando a qualquer outro. Firmado em ${campo('6%','2')} (${campo('18%','duas')}) vias de igual teor.`,
[
  '<strong>Art. 58, II, da Lei 8.245/91:</strong> É competente para as ações de locação o foro do lugar da situação do imóvel.',
  '<strong>Art. 63 do CPC:</strong> As partes podem modificar a competência em razão do valor e do território, elegendo foro onde será proposta ação oriunda de direitos e obrigações.'
])}
${assinaturas('LOCADOR(A)','LOCATÁRIO(A)')}`,

// ─── BUILT-TO-SUIT ────────────────────────────────────────
loc_built_suit: ()=>`
<h2 class="titulo-contrato">Contrato de Locação Built-to-Suit (BTS)</h2>
<p class="subtitulo-contrato">Instrumento Particular de Locação Não Residencial Built-to-Suit — Art. 54-A da Lei nº 8.245/1991</p>
${leiBloco('BASE LEGAL ESPECÍFICA',[
  '<strong>Art. 54-A da Lei 8.245/91 (inserido pela Lei 12.744/2012):</strong> Na locação não residencial de imóvel urbano na qual o locador procede à prévia aquisição, construção ou substancial reforma, por si mesmo ou por terceiros, do imóvel então especificado pelo pretendente à locação, a fim de que seja a este locado por prazo determinado, poderá prevalecer o disposto entre as partes sobre o que dispõe os incisos I a VIII do §1º do art. 40 e os arts. 42 e 43 desta Lei, sendo vedada a revisão judicial do valor dos aluguéis durante o prazo de vigência do contrato e a propositura de ação renovatória.',
  '<strong>§1º:</strong> Poderá ser convencionado que a rescisão antecipada pelo locatário implique na responsabilidade pela quitação das obrigações decorrentes do financiamento contratado pelo locador para edificação do imóvel.',
  '<strong>§2º:</strong> Em caso de denúncia antecipada do vínculo locatício pelo locatário, compromete-se este a cumprir a multa convencionada, que não excederá, porém, a soma dos valores dos aluguéis a receber até o termo final da locação.'
])}

${clausula('CLÁUSULA I — DAS PARTES',
`<strong>LOCADOR(A):</strong> ${campo('70%','NOME COMPLETO OU RAZÃO SOCIAL DO LOCADOR')}, inscrito(a) no CNPJ/CPF nº ${campo('30%','00.000.000/0001-00')}, com sede/domicílio em ${campo('60%','ENDEREÇO COMPLETO')}, doravante <strong>LOCADOR(A)</strong>.<br><br>
<strong>LOCATÁRIO(A):</strong> ${campo('70%','NOME COMPLETO OU RAZÃO SOCIAL DO LOCATÁRIO')}, inscrito(a) no CNPJ/CPF nº ${campo('30%','00.000.000/0001-00')}, com sede/domicílio em ${campo('60%','ENDEREÇO COMPLETO')}, doravante <strong>LOCATÁRIO(A)</strong>.`,
['<strong>Art. 104 do Código Civil:</strong> A validade do negócio jurídico requer agente capaz, objeto lícito, possível, determinado ou determinável, forma prescrita ou não defesa em lei.'])}

${clausula('CLÁUSULA II — DO OBJETO E DO PROJETO ESPECÍFICO',
`O LOCADOR(A) procederá à ${campo('45%','aquisição do terreno e construção / substancial reforma')} do imóvel situado na ${campo('65%','LOGRADOURO, Nº, BAIRRO, CIDADE, ESTADO, CEP')}, conforme <strong>projeto arquitetônico e memorial descritivo</strong> elaborados de acordo com as especificações do LOCATÁRIO(A) e constantes do <strong>Anexo I</strong>, para uso como ${campo('40%','FINALIDADE COMERCIAL / INDUSTRIAL / LOGÍSTICA')}.<br><br>
O investimento total estimado do LOCADOR(A) é de R$ ${campo('22%','0.000.000,00')}, constituindo a base de cálculo do aluguel. O imóvel será entregue na data de ${campo('22%','DD/MM/AAAA')}, salvo caso fortuito ou força maior devidamente comprovados.`,
['<strong>Art. 54-A, caput, da Lei 8.245/91:</strong> O locador procede à prévia aquisição, construção ou substancial reforma do imóvel especificado pelo pretendente à locação.'])}

${clausula('CLÁUSULA III — DO PRAZO',
`O prazo é de <strong>${campo('22%','120 (cento e vinte)')} meses (${campo('10%','10')} anos)</strong>, com início em ${campo('22%','DATA DE INÍCIO')} e término em ${campo('22%','DATA DE TÉRMINO')}, prorrogável somente por mútuo acordo escrito.<br><br>
<strong>Irreversibilidade:</strong> Dada a natureza econômica do contrato e o investimento realizado pelo LOCADOR(A), as partes reconhecem expressamente que o prazo contratual é essencial ao equilíbrio financeiro da operação.`,
['<strong>Art. 54-A, caput:</strong> O imóvel é locado por prazo determinado, sendo vedada a revisão judicial do valor dos aluguéis durante a vigência.'])}

${clausula('CLÁUSULA IV — DO ALUGUEL E IRREVISIBILIDADE',
`O aluguel mensal inicial é de <strong>R$ ${campo('22%','0.000,00')} (${campo('55%','valor por extenso')})</strong>, pago até o dia ${campo('5%','05')} de cada mês vencido. Reajustado anualmente pelo <strong>${campo('22%','IGP-M/FGV')}</strong>.<br><br>
<strong>Irrevisibilidade judicial:</strong> As partes pactuam expressamente a <strong>irrevogabilidade e irrevisibilidade judicial</strong> do valor do aluguel durante toda a vigência contratual, nos termos do art. 54-A da Lei 8.245/91. Qualquer revisão somente será admitida por mútuo acordo formalizado em aditivo escrito.`,
['<strong>Art. 54-A, caput:</strong> Vedada a revisão judicial do valor dos aluguéis e a propositura de ação renovatória.'])}

${clausula('CLÁUSULA V — DA MULTA POR RESCISÃO ANTECIPADA',
`Em caso de denúncia antecipada pelo LOCATÁRIO(A), este se compromete a pagar multa equivalente à <strong>totalidade dos aluguéis vincendos</strong> até o termo final, bem como a quitar eventuais obrigações de financiamento contraído pelo LOCADOR(A) para edificação, pro rata do saldo devedor, conforme demonstrativo a ser apresentado pelo LOCADOR(A).<br><br>
Em caso de denúncia antecipada pelo LOCADOR(A) sem justa causa, este pagará ao LOCATÁRIO(A) indenização equivalente a ${campo('12%','3 (três)')} aluguéis mensais, sem prejuízo de perdas e danos.`,
['<strong>Art. 54-A, §§1º e 2º, da Lei 8.245/91:</strong> Rescisão antecipada pelo locatário implica responsabilidade pela quitação das obrigações do financiamento e multa não superior à soma dos aluguéis vincendos.'])}

${clausula('CLÁUSULA VI — DOS ENCARGOS E BENFEITORIAS',
`São de responsabilidade do LOCATÁRIO(A) todos os encargos descritos na Cláusula V do modelo comercial, incluindo seguro com apólice no valor de R$ ${campo('18%','0.000.000,00')} a favor do LOCADOR(A).<br><br>
Todas as benfeitorias realizadas incorporar-se-ão ao imóvel sem indenização ou retenção, por expressa previsão contratual.`,
['<strong>Art. 54-A, caput:</strong> Podem prevalecer disposições distintas das regras gerais de locação, quanto a encargos e benfeitorias, por acordo entre as partes.'])}

${clausula('CLÁUSULA VII — DO FORO',
`Foro da Comarca de ${campo('30%','CIDADE/ESTADO')}. Firmado em ${campo('6%','2')} (${campo('18%','duas')}) vias.`,
['<strong>Art. 78 do CPC:</strong> É lícito às partes estipular, previamente e por escrito, o foro onde será proposta eventual ação oriunda de direitos e obrigações.'])}
${assinaturas('LOCADOR(A)','LOCATÁRIO(A)')}`,

// ─── TEMPORADA ─────────────────────────────────────────────
loc_temporada: ()=>`
<h2 class="titulo-contrato">Contrato de Locação por Temporada</h2>
<p class="subtitulo-contrato">Instrumento Particular de Locação Temporária — Art. 48 e seguintes da Lei nº 8.245/1991</p>
${leiBloco('BASE LEGAL',[
  '<strong>Art. 48 da Lei 8.245/91:</strong> Considera-se locação para temporada aquela destinada à residência temporária do locatário, para prática de lazer, realização de cursos, tratamento de saúde, feitura de obras em seu imóvel, e outros fatos que decorram tão-somente de determinado tempo, e contratada por prazo não superior a noventa dias, esteja ou não mobiliado o imóvel.',
  '<strong>Art. 49 da Lei 8.245/91:</strong> O locador poderá receber de uma só vez e antecipadamente os aluguéis e encargos, bem como exigir qualquer das modalidades de garantia previstas no art. 37 para atender as demais obrigações do contrato.'
])}

${clausula('CLÁUSULA I — DAS PARTES',

<strong>LOCATÁRIO(A):</strong> ${campo('70%','NOME COMPLETO')}, CPF nº ${campo('28%','000.000.000-00')}, RG ${campo('20%','00.000.000-0')}, residente em ${campo('60%','ENDEREÇO DO LOCATÁRIO')}.`,
['<strong>Art. 104 do Código Civil:</strong> A validade do negócio jurídico requer agente capaz, objeto lícito e forma prescrita ou não defesa em lei.'])}

${clausula('CLÁUSULA II — DO OBJETO, ESTADO E INVENTÁRIO',
`O objeto é o imóvel ${campo('28%','CASA / APARTAMENTO / CHÁCARA')} situado em ${campo('70%','ENDEREÇO COMPLETO, CIDADE, ESTADO, CEP')}, entregue <strong>${campo('25%','MOBILIADO / NÃO MOBILIADO')}</strong>, destinado à residência temporária para fins de <strong>${campo('40%','lazer / curso / tratamento de saúde / reforma do imóvel próprio')}</strong>.<br><br>
O LOCATÁRIO(A) declara ter recebido o imóvel nas condições descritas no <strong>Laudo de Vistoria e Inventário de Bens</strong> (Anexo I), responsabilizando-se por devolvê-lo nas mesmas condições.`,
['<strong>Art. 48 da Lei 8.245/91:</strong> A locação por temporada não excederá 90 dias e pode abranger imóvel mobiliado.'])}

${clausula('CLÁUSULA III — DO PRAZO — MÁXIMO 90 DIAS',
`O prazo é de <strong>${campo('14%','XX (por extenso)')} dias</strong>, com início em ${campo('22%','DD/MM/AAAA')} e término em ${campo('22%','DD/MM/AAAA')}. O prazo total <strong>NÃO EXCEDERÁ</strong> 90 (noventa) dias. Findo o prazo, sem devolução do imóvel, o LOCADOR(A) poderá retomá-lo nos termos do art. 59, §1º, IX, da Lei 8.245/91.`,
['<strong>Art. 48 da Lei 8.245/91:</strong> Contratada por prazo não superior a noventa dias. Descumprido o prazo, aplica-se o rito especial de despejo.'])}

${clausula('CLÁUSULA IV — DO VALOR TOTAL E PAGAMENTO ANTECIPADO',
`O valor total da locação é de <strong>R$ ${campo('22%','0.000,00')} (${campo('55%','valor por extenso')})</strong>, pago <strong>integralmente e antecipadamente</strong> na data da assinatura deste contrato, nos termos do art. 49 da Lei 8.245/91, mediante ${campo('40%','PIX/transferência/espécie')} — comprovante em anexo.`,
['<strong>Art. 49 da Lei 8.245/91:</strong> O locador poderá receber de uma só vez e antecipadamente os aluguéis e encargos.'])}

${clausula('CLÁUSULA V — DOS ENCARGOS E REGRAS DE USO',
`Correm por conta do LOCATÁRIO(A): consumo de água, energia elétrica, gás, internet e demais utilidades durante o período. Taxas condominiais e IPTU são de responsabilidade do LOCADOR(A).<br><br>
<strong>Regras de uso:</strong> É vedado ao LOCATÁRIO(A): (a) realizar festas ou eventos com mais de ${campo('6%','00')} pessoas; (b) trazer animais, salvo autorização expressa; (c) fumar no interior do imóvel; (d) causar perturbação aos vizinhos; (e) sublocar ou ceder o imóvel a terceiros.`,
['<strong>Art. 23, I e II, da Lei 8.245/91:</strong> O locatário deve usar o imóvel de acordo com o convencionado e tratá-lo com o mesmo cuidado como se fosse seu.'])}

${clausula('CLÁUSULA VI — DA GARANTIA E CAUÇÃO',
`Como garantia das obrigações, o LOCATÁRIO(A) deposita a quantia de <strong>R$ ${campo('18%','0.000,00')} (${campo('45%','valor por extenso')})</strong> a título de <strong>caução</strong>, a ser restituída em até ${campo('6%','5 (cinco)')} dias úteis após a vistoria de saída e comprovação de inexistência de danos ou débitos pendentes.`,
['<strong>Art. 49, parágrafo único, da Lei 8.245/91:</strong> Ao término da locação, a caução não utilizada deverá ser devolvida ao locatário.'])}

${clausula('CLÁUSULA VII — DA RESCISÃO',
`O descumprimento de qualquer cláusula implicará rescisão imediata e perda da caução em favor da parte inocente, além de perdas e danos apurados. O LOCADOR(A) poderá retomar o imóvel imediatamente, sem necessidade de prévia interpelação judicial.`,
['<strong>Art. 9º, II e III, da Lei 8.245/91:</strong> A locação pode ser desfeita em decorrência de infração legal ou contratual, ou falta de pagamento.'])}

${clausula('CLÁUSULA VIII — DO FORO',
`Foro da Comarca de ${campo('30%','CIDADE/ESTADO')}. Firmado em ${campo('6%','2')} (${campo('18%','duas')}) vias.`,[])}
${assinaturas('LOCADOR(A)','LOCATÁRIO(A)')}`,

// ─── COMODATO ──────────────────────────────────────────────
comodato: ()=>`
<h2 class="titulo-contrato">Contrato de Comodato de Imóvel</h2>
<p class="subtitulo-contrato">Instrumento Particular de Comodato — Arts. 579 a 585 do Código Civil Brasileiro</p>
${leiBloco('BASE LEGAL GERAL',[
  '<strong>Art. 579 do Código Civil:</strong> O comodato é o empréstimo gratuito de coisas não fungíveis. Perfaz-se com a tradição do objeto.',
  '<strong>Art. 580 do Código Civil:</strong> Os tutores, curadores e em geral todos os administradores de bens alheios não poderão dar em comodato, sem autorização especial, os bens confiados à sua guarda.',
  '<strong>Art. 582 do Código Civil:</strong> O comodatário é obrigado a conservar, como se sua própria fora, a coisa emprestada, não podendo usá-la senão de acordo com o contrato ou a natureza dela, sob pena de responder por perdas e danos.',
  '<strong>Art. 583 do Código Civil:</strong> Se, correndo risco o objeto do comodato juntamente com outros do comodatário, antepuser este os seus aos do comodante, responderá por perdas e danos.',
  '<strong>Art. 585 do Código Civil:</strong> Se duas ou mais pessoas forem simultaneamente comodatárias de uma coisa, ficarão solidariamente responsáveis para com o comodante.'
])}

${clausula('CLÁUSULA I — DAS PARTES',
`<strong>COMODANTE:</strong> ${campo('70%','NOME COMPLETO DO COMODANTE')}, CPF nº ${campo('28%','000.000.000-00')}, RG nº ${campo('20%','00.000.000-0')}, residente em ${campo('60%','ENDEREÇO COMPLETO DO COMODANTE')}, na qualidade de proprietário(a) e legítimo(a) possuidor(a) do imóvel, doravante <strong>COMODANTE</strong>.<br><br>
<strong>COMODATÁRIO(A):</strong> ${campo('70%','NOME COMPLETO DO COMODATÁRIO')}, CPF nº ${campo('28%','000.000.000-00')}, RG nº ${campo('20%','00.000.000-0')}, residente em ${campo('60%','ENDEREÇO COMPLETO DO COMODATÁRIO')}, doravante <strong>COMODATÁRIO(A)</strong>.`,
['<strong>Art. 104 do Código Civil:</strong> A validade do negócio jurídico requer agente capaz, objeto lícito e forma prescrita ou não defesa em lei.'])}

${clausula('CLÁUSULA II — DO OBJETO E DA GRATUIDADE',
`O COMODANTE, na qualidade de proprietário(a) e legítimo(a) possuidor(a), cede gratuitamente ao COMODATÁRIO(A) o imóvel ${campo('22%','CASA / APTO / OUTRO')} situado na ${campo('70%','ENDEREÇO COMPLETO, CIDADE, ESTADO, CEP')}, registrado sob Matrícula nº ${campo('14%','XXXXX')} no CRI de ${campo('22%','CIDADE')}, para fins de ${campo('40%','residência do comodatário e familiares / uso comercial / guarda de bens')}.<br><br>
O presente comodato é essencialmente <strong>gratuito e personalíssimo</strong>, sendo vedada a sub-comodação, cessão ou transferência do imóvel a terceiros, a qualquer título, sem anuência prévia e escrita do COMODANTE, sob pena de rescisão imediata e responsabilização por perdas e danos.`,
['<strong>Art. 579 do Código Civil:</strong> O comodato é o empréstimo gratuito de coisas não fungíveis. Perfaz-se com a tradição do objeto.'])}

${clausula('CLÁUSULA III — DO PRAZO E DA RESTITUIÇÃO',
`O prazo do presente comodato é <strong>${campo('45%','por prazo determinado de X meses/anos / por prazo indeterminado')}</strong>.<br><br>
<strong>Se prazo determinado:</strong> início em ${campo('22%','DD/MM/AAAA')} e término em ${campo('22%','DD/MM/AAAA')}, data em que o COMODATÁRIO(A) se compromete a restituir o imóvel independentemente de notificação.<br><br>
<strong>Se prazo indeterminado:</strong> o COMODANTE poderá requerer o imóvel a qualquer tempo, mediante notificação prévia de <strong>${campo('6%','30')} (${campo('20%','trinta')}) dias</strong>. Em caso de necessidade urgente e imprevista do COMODANTE, o prazo será reduzido ao mínimo indispensável.<br><br>
A restituição será precedida de vistoria comparativa, ficando o COMODATÁRIO(A) responsável pelos danos apurados.`,
['<strong>Art. 581 do Código Civil:</strong> Se o comodato não tiver prazo convencional, presumir-se-lhe-á o necessário para o uso concedido; não podendo o comodante, salvo necessidade imprevista e urgente, reconhecida pelo juiz, suspender o uso e gozo da coisa emprestada antes de findo o prazo convencional, ou o que se determine pelo uso outorgado.'])}

${clausula('CLÁUSULA IV — DAS OBRIGAÇÕES DO COMODATÁRIO(A)',
`O COMODATÁRIO(A) obriga-se a:<br>
(a) Conservar o imóvel como se fosse seu, respondendo por perdas e danos inclusive na hipótese de caso fortuito, se assumiu o risco;<br>
(b) Pagar todas as despesas de consumo: água, energia elétrica, gás, internet e quaisquer outras utilities;<br>
(c) Arcar com o IPTU e taxas municipais durante o período do comodato;<br>
(d) Zelar pela manutenção ordinária do imóvel (troca de lâmpadas, reparos simples, dedetização, etc.);<br>
(e) Comunicar ao COMODANTE, imediatamente, qualquer dano, infiltração, vício ou ameaça ao imóvel;<br>
(f) Não realizar quaisquer obras, modificações ou benfeitorias sem autorização prévia e escrita do COMODANTE;<br>
(g) Não ceder o uso do imóvel a terceiros, nem a título gratuito.`,
['<strong>Art. 582 do Código Civil:</strong> O comodatário é obrigado a conservar, como se sua própria fora, a coisa emprestada, não podendo usá-la senão de acordo com o contrato ou a natureza dela, sob pena de responder por perdas e danos. Se o comodatário tiver mais de uma coisa em risco, e não puder salvar todas, preferirá as próprias às do comodante.'])}

${clausula('CLÁUSULA V — DO ALUGUEL-PENA POR MORA NA RESTITUIÇÃO',
`Em caso de mora na restituição do imóvel após o término do prazo ou notificação, o COMODATÁRIO(A) arcará com <strong>aluguel-pena de R$ ${campo('18%','0.000,00')} (${campo('45%','valor por extenso')}) por mês ou fração de mês</strong> de atraso, respondendo também pelos riscos da coisa, nos termos do art. 582 in fine do Código Civil, sem prejuízo de ação de reintegração de posse.`,
['<strong>Art. 582, parte final, do Código Civil:</strong> Se o comodatário tiver mais de uma coisa em risco, e não puder salvar todas, preferirá as próprias às do comodante. Se o comodatário assumiu o risco de caso fortuito, responderá por ele.'])}

${clausula('CLÁUSULA VI — DA RESCISÃO',
`O descumprimento de qualquer cláusula pelo COMODATÁRIO(A) implicará rescisão imediata e reintegração de posse do COMODANTE, independentemente de notificação prévia, sujeitando o COMODATÁRIO(A) a perdas e danos, honorários advocatícios e custas processuais.`,
['<strong>Art. 475 do Código Civil:</strong> A parte lesada pelo inadimplemento pode pedir a resolução do contrato, se não preferir exigir-lhe o cumprimento, cabendo, em qualquer dos casos, indenização por perdas e danos.'])}

${clausula('CLÁUSULA VII — DO FORO',
`Foro da Comarca de ${campo('30%','CIDADE/ESTADO')}. Firmado em ${campo('6%','2')} (${campo('18%','duas')}) vias.`,[])}
${assinaturas('COMODANTE','COMODATÁRIO(A)')}`,

// ─── EXCLUSIVIDADE VENDA ──────────────────────────────────
exclusividade_venda: ()=>`
<h2 class="titulo-contrato">Autorização de Venda com Exclusividade</h2>
<p class="subtitulo-contrato">Contrato de Corretagem com Cláusula de Exclusividade — Arts. 722 a 729 do Código Civil / Lei nº 6.530/78</p>
${leiBloco('BASE LEGAL',[
  '<strong>Art. 722 do Código Civil:</strong> Pelo contrato de corretagem, uma pessoa, não ligada a outra em virtude de mandato, de prestação de serviços ou por qualquer relação de dependência, obriga-se a obter para a segunda um ou mais negócios, conforme as instruções recebidas.',
  '<strong>Art. 726 do Código Civil:</strong> Iniciado e concluído o negócio diretamente entre as partes, por interferência do corretor, e não havendo vedação expressa à exclusividade, ainda assim a remuneração é devida.',
  '<strong>Art. 3º da Lei 6.530/78:</strong> Compete ao Corretor de Imóveis exercer a intermediação na compra, venda, permuta e locação de imóveis, podendo, ainda, opinar quanto à comercialização imobiliária.'
])}

${clausula('CLÁUSULA I — DAS PARTES',
`<strong>PROPRIETÁRIO(A)/OUTORGANTE:</strong> ${campo('70%','NOME COMPLETO DO PROPRIETÁRIO')}, CPF nº ${campo('28%','000.000.000-00')}, RG nº ${campo('20%','00.000.000-0')}, residente em ${campo('60%','ENDEREÇO COMPLETO DO PROPRIETÁRIO')}, doravante <strong>CONTRATANTE</strong>.<br><br>
<strong>OUTORGADA — FCOSTA GESTÃO IMOBILIÁRIA:</strong> CRECI ${campo('16%','294791-F')}, CNPJ nº ${campo('25%','00.000.000/0001-00')}, com sede em ${campo('55%','ENDEREÇO DA FCOSTA')}, doravante <strong>CORRETORA</strong>.`,
['<strong>Art. 722 do Código Civil:</strong> Define o contrato de corretagem como a obrigação de obter negócios conforme instruções recebidas, sem relação de dependência.'])}

${clausula('CLÁUSULA II — DO OBJETO E DA EXCLUSIVIDADE',
`O CONTRATANTE outorga à CORRETORA autorização <strong>EXCLUSIVA</strong> para intermediar a venda do imóvel ${campo('22%','TIPO DO IMÓVEL')} situado na ${campo('70%','LOGRADOURO COMPLETO, Nº, COMPLEMENTO, BAIRRO, CIDADE, ESTADO, CEP')}, registrado sob Matrícula nº ${campo('14%','XXXXX')} no CRI de ${campo('22%','CIDADE')}, com área total de ${campo('12%','00,00')} m².<br><br>
<strong>Da exclusividade absoluta:</strong> Durante o prazo de vigência, o CONTRATANTE abstém-se de negociar o imóvel — diretamente ou por intermédio de outros profissionais. A concretização da venda por qualquer meio — incluindo negociação direta pelo proprietário — durante o prazo de exclusividade, garante à CORRETORA o direito à comissão integral pactuada, nos termos do art. 726 do Código Civil.`,
['<strong>Art. 726 do Código Civil:</strong> Concluído o negócio com a interferência do corretor, é devida a comissão. Mesmo sem interferência direta, se houver cláusula de exclusividade, a remuneração é devida se o negócio se realizar durante o prazo.'])}

${clausula('CLÁUSULA III — DO PREÇO MÍNIMO E DAS CONDIÇÕES',
`O valor mínimo aceitável para a venda é de <strong>R$ ${campo('22%','0.000.000,00')} (${campo('55%','valor por extenso')})</strong>.<br><br>
Condições de pagamento aceitas pelo CONTRATANTE: ${campo('65%','À vista / Financiamento bancário (CEF, BB, outros) / Permuta parcial com imóvel de valor até R$ ...')}.<br><br>
Qualquer proposta de valor inferior ou com condições distintas deverá ser submetida por escrito ao CONTRATANTE, que terá prazo de ${campo('6%','48')} horas para manifestação.`,
['<strong>Art. 725 do Código Civil:</strong> A remuneração é devida ao corretor uma vez que tenha conseguido o resultado previsto no contrato de mediação, ou ainda que este não se efetive em virtude de arrependimento das partes.'])}

${clausula('CLÁUSULA IV — DA COMISSÃO DE CORRETAGEM',
`Pela intermediação e concretização da venda, a CORRETORA fará jus à comissão de <strong>${campo('5%','6')}% (${campo('18%','seis por cento')})</strong> sobre o valor efetivo de venda, a ser paga <strong>pelo VENDEDOR</strong> no ato da assinatura do instrumento de compra e venda ou do recebimento do sinal.<br><br>
A comissão é devida integralmente ainda que: (a) a venda seja realizada diretamente pelo proprietário durante o período de exclusividade; (b) o comprador desista após a conclusão do negócio; (c) o contrato de compra e venda não se concretize por fato imputável ao CONTRATANTE.`,
['<strong>Art. 725 do Código Civil:</strong> A remuneração é devida ao corretor uma vez que tenha conseguido o resultado previsto no contrato de mediação, ou ainda que este não se efetive em virtude de arrependimento das partes.','<strong>Tabela CRECI-SP:</strong> A comissão mínima para venda de imóveis é de 6% sobre o valor da transação.'])}

${clausula('CLÁUSULA V — DAS OBRIGAÇÕES DA CORRETORA',
`A CORRETORA compromete-se a:<br>
(a) Divulgar o imóvel em plataformas digitais especializadas (Zap, OLX, Viva Real, etc.) e em sua rede de clientes;<br>
(b) Realizar visitas acompanhadas de forma diligente e profissional;<br>
(c) Qualificar os interessados antes de apresentá-los ao CONTRATANTE;<br>
(d) Apresentar relatórios de visitas e propostas recebidas sempre que solicitado;<br>
(e) Intermediar as negociações com imparcialidade, buscando o melhor resultado para o CONTRATANTE;<br>
(f) Manter sigilo sobre informações confidenciais do imóvel e do CONTRATANTE.`,
['<strong>Art. 723 do Código Civil:</strong> O corretor é obrigado a executar a mediação com diligência e prudência, e a prestar ao cliente, espontaneamente, todas as informações sobre o andamento do negócio.'])}

${clausula('CLÁUSULA VI — DAS OBRIGAÇÕES DO CONTRATANTE',
`O CONTRATANTE compromete-se a:<br>
(a) Fornecer toda a documentação do imóvel (matrícula atualizada, certidões, IPTU, habite-se, etc.) e pessoal (CPF, RG, certidões negativas);<br>
(b) Facilitar as visitas ao imóvel, disponibilizando-o para agendamento;<br>
(c) Informar prontamente quaisquer ônus, gravames, débitos ou pendências sobre o imóvel;<br>
(d) Não negociar o imóvel diretamente durante o prazo de exclusividade.`,
['<strong>Art. 422 do Código Civil:</strong> Os contratantes são obrigados a guardar os princípios de probidade e boa-fé.'])}

${clausula('CLÁUSULA VII — DO PRAZO DE VIGÊNCIA',
`Esta autorização tem validade de <strong>${campo('18%','90 (noventa)')} dias</strong>, a partir de ${campo('22%','01/01/2026')}, podendo ser renovada por mútuo acordo expresso. Findo o prazo sem renovação, cessa automaticamente a exclusividade, podendo qualquer das partes não prorrogá-la.`,
['<strong>Art. 722 do Código Civil:</strong> O contrato de corretagem pode ser por prazo determinado ou indeterminado.'])}

${clausula('CLÁUSULA VIII — DO FORO',
`Foro da Comarca de ${campo('30%','CIDADE/ESTADO')}. Firmado em ${campo('6%','2')} (${campo('18%','duas')}) vias.`,[])}
${assinaturas('CONTRATANTE / PROPRIETÁRIO(A)','PELA FCOSTA GESTÃO IMOBILIÁRIA')}`,

venda_sem_exclusividade: ()=>`
<h2 class="titulo-contrato">Autorização de Venda sem Exclusividade</h2>
<p class="subtitulo-contrato">Contrato de Corretagem sem Cláusula de Exclusividade — Arts. 722 a 729 do Código Civil / Lei nº 6.530/78</p>
${leiBloco('BASE LEGAL',[
  '<strong>Art. 722 do Código Civil:</strong> Pelo contrato de corretagem, uma pessoa obriga-se a obter para a segunda um ou mais negócios, conforme as instruções recebidas, sem qualquer relação de dependência.',
  '<strong>Art. 725 do Código Civil:</strong> A remuneração é devida ao corretor uma vez que tenha conseguido o resultado previsto no contrato de mediação, ou ainda que este não se efetive em virtude de arrependimento das partes.'
])}

${clausula('CLÁUSULA I — DAS PARTES',
`<strong>CONTRATANTE/PROPRIETÁRIO(A):</strong> ${campo('70%','NOME COMPLETO')}, CPF nº ${campo('28%','000.000.000-00')}, RG ${campo('20%','00.000.000-0')}, residente em ${campo('60%','ENDEREÇO COMPLETO')}.<br><br>
<strong>CORRETORA — FCOSTA GESTÃO IMOBILIÁRIA:</strong> CRECI ${campo('16%','294791-F')}, CNPJ ${campo('25%','00.000.000/0001-00')}, com sede em ${campo('55%','ENDEREÇO DA FCOSTA')}.`,[])}

${clausula('CLÁUSULA II — DO OBJETO E AUSÊNCIA DE EXCLUSIVIDADE',
`O CONTRATANTE autoriza a FCOSTA a intermediar a venda do imóvel ${campo('22%','TIPO')} situado na ${campo('70%','LOGRADOURO COMPLETO, Nº, BAIRRO, CIDADE, ESTADO, CEP')}, Matrícula nº ${campo('14%','XXXXX')} no CRI de ${campo('22%','CIDADE')}.<br><br>
<strong>Ausência de exclusividade:</strong> O CONTRATANTE preserva o direito de negociar o imóvel diretamente ou por intermédio de outros profissionais simultaneamente. A FCOSTA fará jus à comissão <strong>somente se a venda for concretizada por sua efetiva e comprovada intermediação</strong>, sendo vedado o pagamento duplo de comissão.`,
['<strong>Art. 726 do Código Civil:</strong> Tendo o corretor ajustado a corretagem com exclusividade, terá direito à remuneração integral ainda que realizado o negócio sem a sua mediação. Sem exclusividade, somente é devida a comissão se foi o corretor o intermediador efetivo.'])}

${clausula('CLÁUSULA III — DO PREÇO E CONDIÇÕES',
`Valor mínimo: <strong>R$ ${campo('22%','0.000.000,00')} (${campo('55%','valor por extenso')})</strong>. Condições aceitas: ${campo('55%','À vista / Financiamento / Permuta parcial')}.`,
['<strong>Art. 481 do Código Civil:</strong> Pelo contrato de compra e venda, um dos contratantes se obriga a transferir o domínio de certa coisa, e o outro, a pagar-lhe certo preço em dinheiro.'])}

${clausula('CLÁUSULA IV — DA COMISSÃO',
`Comissão de <strong>${campo('5%','6')}% (${campo('18%','seis por cento')})</strong> sobre o valor efetivo da venda, devida apenas se concretizada pela intermediação comprovada da FCOSTA, paga no ato da assinatura do instrumento de compra e venda.`,
['<strong>Art. 725 do Código Civil:</strong> A remuneração é devida ao corretor uma vez que tenha conseguido o resultado previsto no contrato de mediação.'])}

${clausula('CLÁUSULA V — DAS OBRIGAÇÕES DAS PARTES',
`A FCOSTA obriga-se a divulgar o imóvel, realizar visitas, qualificar compradores e intermediar negociações com diligência. O CONTRATANTE compromete-se a fornecer documentação completa, facilitar visitas e informar quaisquer ônus ou pendências sobre o imóvel.`,
['<strong>Art. 723 do Código Civil:</strong> O corretor é obrigado a executar a mediação com diligência e prudência.','<strong>Art. 422 do Código Civil:</strong> Princípio da boa-fé objetiva obriga ambas as partes.'])}

${clausula('CLÁUSULA VI — DO PRAZO',
`Validade: <strong>${campo('18%','60 (sessenta)')} dias</strong>, a partir de ${campo('22%','01/01/2026')}, renovável por mútuo acordo.`,[])}

${clausula('CLÁUSULA VII — DO FORO',
`Foro da Comarca de ${campo('30%','CIDADE/ESTADO')}.`,[])}
