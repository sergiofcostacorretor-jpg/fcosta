// ─── AUTORIZAÇÃO LOCAÇÃO ──────────────────────────────────
autorizacao_locacao: ()=>`
<h2 class="titulo-contrato">Autorização de Locação e Gestão Imobiliária</h2>
<p class="subtitulo-contrato">Mandato Especial para Locação e Administração — Lei nº 8.245/91 / Arts. 653 a 692 do Código Civil / Lei 6.530/78</p>
${leiBloco('BASE LEGAL',[
  '<strong>Art. 653 do Código Civil:</strong> Opera-se o mandato quando alguém recebe de outrem poderes para, em seu nome, praticar atos ou administrar interesses.',
  '<strong>Art. 661 do Código Civil:</strong> O mandato em termos gerais só confere poderes de administração. Para alienar, hipotecar, transigir, ou praticar outros atos que exorbitem da administração ordinária, depende a procuração de poderes especiais e expressos.',
  '<strong>Art. 3º da Lei 6.530/78:</strong> Compete ao Corretor de Imóveis exercer a intermediação na compra, venda, permuta e locação de imóveis.'
])}

${clausula('CLÁUSULA I — DAS PARTES',
`<strong>PROPRIETÁRIO(A)/MANDANTE:</strong> ${campo('70%','NOME COMPLETO')}, CPF nº ${campo('28%','000.000.000-00')}, RG nº ${campo('20%','00.000.000-0')}, residente em ${campo('60%','ENDEREÇO COMPLETO')}, doravante <strong>CONTRATANTE</strong>.<br><br>
<strong>ADMINISTRADORA/MANDATÁRIA — FCOSTA GESTÃO IMOBILIÁRIA:</strong> CRECI ${campo('16%','294791-F')}, CNPJ ${campo('25%','00.000.000/0001-00')}, com sede em ${campo('55%','ENDEREÇO DA FCOSTA')}, doravante <strong>ADMINISTRADORA</strong>.`,[])}

${clausula('CLÁUSULA II — DO OBJETO',
`O CONTRATANTE outorga à ADMINISTRADORA mandato especial para intermediar a locação e gerir o imóvel ${campo('22%','TIPO')} situado na ${campo('70%','LOGRADOURO COMPLETO, Nº, BAIRRO, CIDADE, ESTADO, CEP')}, Matrícula nº ${campo('14%','XXXXX')} no CRI de ${campo('22%','CIDADE')}, para fins ${campo('28%','RESIDENCIAL / NÃO RESIDENCIAL')}.`,
['<strong>Art. 653 do Código Civil:</strong> Opera-se o mandato quando alguém recebe de outrem poderes para, em seu nome, praticar atos ou administrar interesses.'])}

${clausula('CLÁUSULA III — DOS PODERES CONFERIDOS',
`A ADMINISTRADORA fica expressamente autorizada a: (a) divulgar e anunciar o imóvel; (b) selecionar e qualificar candidatos a locatário; (c) elaborar e assinar contratos de locação em nome do CONTRATANTE; (d) receber aluguéis, encargos e demais créditos relacionados ao imóvel; (e) emitir recibos em nome do CONTRATANTE; (f) efetuar reajustes e revisões de aluguel; (g) realizar vistorias de entrada, periódicas e de saída; (h) propor ações de despejo, cobrança e consignação em nome do CONTRATANTE, mediante prévia comunicação; (i) contratar serviços de manutenção e reparos ordinários até o valor de R$ ${campo('14%','500,00')} por ocorrência, sem necessidade de consulta prévia.`,
['<strong>Art. 661, §1º, do Código Civil:</strong> O mandato que contenha a cláusula "plenos poderes" só confere ao mandatário os necessários para os atos de administração ordinária.','<strong>Art. 667 do Código Civil:</strong> O mandatário é obrigado a aplicar toda a sua diligência habitual na execução do mandato.'])}

${clausula('CLÁUSULA IV — DAS CONDIÇÕES MÍNIMAS DA LOCAÇÃO',
`Aluguel mínimo: <strong>R$ ${campo('18%','0.000,00')} (${campo('45%','valor por extenso')})</strong>. Prazo mínimo: ${campo('18%','30 (trinta)')} meses (residencial) ou ${campo('18%','60 (sessenta)')} meses (não residencial). Garantia mínima exigida: ${campo('35%','caução / fiança / seguro fiança')}.<br><br>
Condições distintas das aqui estabelecidas dependerão de autorização prévia e escrita do CONTRATANTE.`,
['<strong>Art. 46 da Lei 8.245/91:</strong> Para contratos residenciais por prazo determinado de 30 meses ou mais, aplica-se o regime de retomada automática ao final do prazo.'])}

${clausula('CLÁUSULA V — DA REMUNERAÇÃO DA ADMINISTRADORA',
`Pela intermediação (locação inicial), a ADMINISTRADORA receberá comissão equivalente a <strong>1 (um) aluguel</strong> (taxa de locação), debitada do primeiro aluguel recebido.<br><br>
Pela administração mensal, receberá <strong>${campo('5%','8')}% (${campo('18%','oito por cento')})</strong> sobre o valor dos aluguéis e encargos efetivamente recebidos a cada mês.<br><br>
Em caso de renovação do contrato com o mesmo locatário, a taxa de renovação será de <strong>${campo('5%','50')}% (${campo('18%','cinquenta por cento')})</strong> de um aluguel.`,
['<strong>Art. 725 do Código Civil:</strong> A remuneração é devida ao corretor uma vez que tenha conseguido o resultado previsto no contrato de mediação.','<strong>Tabela CRECI-SP:</strong> A taxa de administração para locação varia entre 8% e 12% do aluguel mensal recebido.'])}

${clausula('CLÁUSULA VI — DO REPASSE DE VALORES',
`A ADMINISTRADORA repassará ao CONTRATANTE os valores recebidos, deduzidos sua remuneração e eventuais despesas autorizadas, até o <strong>dia ${campo('5%','10')} (${campo('18%','dez')})</strong> dia útil do mês subsequente ao vencimento dos aluguéis, mediante transferência para a conta indicada: ${campo('65%','Banco / Agência / Conta / PIX — Titular')}.<br><br>
Na hipótese de inadimplência do locatário, a ADMINISTRADORA comunicará o CONTRATANTE imediatamente e adotará as providências de cobrança amigável e, se necessário, judicial, conforme poderes outorgados.`,
['<strong>Art. 668 do Código Civil:</strong> O mandatário é obrigado a dar contas de sua gerência ao mandante, transferindo-lhe as vantagens provenientes do mandato.'])}

${clausula('CLÁUSULA VII — DO PRAZO E DA RESCISÃO',
`Validade: <strong>${campo('14%','12 (doze)')} meses</strong>, a partir de ${campo('22%','01/01/2026')}, renovando-se automaticamente por iguais períodos, salvo denúncia de qualquer das partes com antecedência mínima de <strong>30 (trinta) dias</strong>.<br><br>
A rescisão imotivada pelo CONTRATANTE antes do término do prazo, havendo locatário em vigência de contrato administrado pela FCOSTA, implicará pagamento de indenização equivalente a <strong>${campo('5%','3')} (${campo('18%','três')})</strong> mensalidades de administração.`,
['<strong>Art. 682, I, do Código Civil:</strong> Cessa o mandato quando da revogação ou renúncia.','<strong>Art. 686 do Código Civil:</strong> A revogação do mandato, notificada somente ao mandatário, não se pode opor aos terceiros que, ignorando-a, de boa-fé com ele trataram.'])}

${clausula('CLÁUSULA VIII — DO FORO',
`Foro da Comarca de ${campo('30%','CIDADE/ESTADO')}.`,[])}
${assinaturas('PROPRIETÁRIO(A) / CONTRATANTE','PELA FCOSTA GESTÃO IMOBILIÁRIA')}`,

// ─── COMPRA E VENDA ───────────────────────────────────────
compra_venda: ()=>`
<h2 class="titulo-contrato">Compromisso de Compra e Venda de Imóvel</h2>
<p class="subtitulo-contrato">Instrumento Particular de Promessa de Compra e Venda — Irrevogável e Irretratável</p>
${leiBloco('BASE LEGAL GERAL',[
  '<strong>Art. 481 do Código Civil:</strong> Pelo contrato de compra e venda, um dos contratantes se obriga a transferir o domínio de certa coisa, e o outro, a pagar-lhe certo preço em dinheiro.',
  '<strong>Art. 1.417 do Código Civil:</strong> Mediante promessa de compra e venda, em que se não pactuou arrependimento, celebrada por instrumento público ou particular, e registrada no Cartório de Registro de Imóveis, adquire o promitente comprador direito real à aquisição do imóvel.',
  '<strong>Art. 1.418 do Código Civil:</strong> O promitente comprador, titular de direito real, pode exigir do promitente vendedor, ou de terceiros, a quem os direitos deste forem cedidos, a outorga da escritura definitiva de compra e venda, conforme o disposto no instrumento preliminar; e, se houver recusa, requerer ao juiz a adjudicação do imóvel.'
])}

${clausula('CLÁUSULA I — DAS PARTES',
`<strong>PROMITENTE VENDEDOR(A):</strong> ${campo('70%','NOME COMPLETO DO VENDEDOR')}, CPF nº ${campo('28%','000.000.000-00')}, RG nº ${campo('20%','00.000.000-0')}, estado civil ${campo('18%','solteiro(a)/casado(a)')}, ${campo('25%','se casado: regime de bens e cônjuge')}, residente em ${campo('60%','ENDEREÇO COMPLETO DO VENDEDOR')}, doravante <strong>VENDEDOR(A)</strong>.<br><br>
<strong>PROMITENTE COMPRADOR(A):</strong> ${campo('70%','NOME COMPLETO DO COMPRADOR')}, CPF nº ${campo('28%','000.000.000-00')}, RG nº ${campo('20%','00.000.000-0')}, estado civil ${campo('18%','solteiro(a)/casado(a)')}, ${campo('25%','se casado: regime de bens e cônjuge')}, residente em ${campo('60%','ENDEREÇO COMPLETO DO COMPRADOR')}, doravante <strong>COMPRADOR(A)</strong>.<br><br>
<strong>INTERVENIENTE CORRETORA:</strong> FCOSTA GESTÃO IMOBILIÁRIA, CRECI ${campo('16%','294791-F')}, na qualidade de intermediadora da presente transação.`,
['<strong>Art. 104 do Código Civil:</strong> A validade do negócio jurídico requer agente capaz, objeto lícito, possível, determinado ou determinável.','<strong>Art. 1.647 do Código Civil:</strong> Ressalvado o disposto no art. 1.648, nenhum dos cônjuges pode, sem autorização do outro, alienar ou gravar de ônus real os bens imóveis.'])}

${clausula('CLÁUSULA II — DO OBJETO E SITUAÇÃO DOCUMENTAL DO IMÓVEL',
`O objeto é o imóvel ${campo('22%','TIPO')} situado na ${campo('70%','LOGRADOURO COMPLETO, Nº, COMPLEMENTO, BAIRRO, CIDADE, ESTADO, CEP')}, com área ${campo('14%','privativa/total')} de ${campo('12%','00,00')} m², registrado sob Matrícula nº ${campo('14%','XXXXX')} no CRI de ${campo('22%','CIDADE')}, com IPTU inscrição nº ${campo('22%','XXXXXXXXX')}.<br><br>
O imóvel é vendido <strong>${campo('60%','LIVRE E DESEMBARAÇADO de quaisquer ônus, dívidas, hipotecas, penhoras e gravames / COM OS SEGUINTES ÔNUS: descrever')}</strong>, conforme certidão de matrícula atualizada (Anexo I) e certidões negativas (Anexo II).<br><br>
O VENDEDOR(A) declara, sob pena das cominações legais, que: (a) é o único e legítimo proprietário(a) do imóvel; (b) o imóvel está livre de vícios, litígios, ações reais ou pessoais reipersecutórias; (c) inexistem débitos de IPTU, condomínio, água, energia ou quaisquer outros que possam recair sobre o imóvel.`,
['<strong>Art. 502 e 503 do Código Civil:</strong> O vendedor responde pelos vícios redibitórios e pela evicção.','<strong>Art. 1.227 do Código Civil:</strong> Os direitos reais sobre imóveis constituídos, ou transmitidos por atos entre vivos, só se adquirem com o registro no Cartório de Registro de Imóveis dos referidos títulos.'])}

${clausula('CLÁUSULA III — DO PREÇO TOTAL E DAS CONDIÇÕES DE PAGAMENTO',
`O preço total e certo da compra e venda é de <strong>R$ ${campo('22%','0.000.000,00')} (${campo('55%','valor por extenso')})</strong>, pago conforme abaixo:<br><br>
(a) <strong>Sinal/Arras:</strong> R$ ${campo('18%','0.000,00')} pagos na assinatura deste instrumento, como sinal confirmatório e princípio de pagamento, nos termos do art. 417 do Código Civil;<br>
(b) <strong>Parcela(s) intermediária(s):</strong> R$ ${campo('18%','0.000,00')} em ${campo('5%','X')} parcelas de R$ ${campo('14%','0.000,00')}, vencendo-se a primeira em ${campo('22%','DD/MM/AAAA')}, e as demais no mesmo dia dos meses subsequentes;<br>
(c) <strong>Saldo final:</strong> R$ ${campo('18%','0.000.000,00')} pagos na data da lavratura da escritura definitiva, mediante ${campo('45%','à vista / financiamento bancário (CEF/BB/Outros) / FGTS')}.<br><br>
<strong>Das arras confirmatórias:</strong> O sinal pago tem natureza de arras confirmatórias. Em caso de desistência pelo COMPRADOR(A), perderá em favor do VENDEDOR(A) o valor do sinal. Em caso de desistência pelo VENDEDOR(A), este devolverá o sinal em dobro ao COMPRADOR(A).`,
['<strong>Art. 417 do Código Civil:</strong> Se, por ocasião da conclusão do contrato, uma parte der à outra, a título de arras, dinheiro ou outro bem móvel, deverão as arras, em caso de execução, ser restituídas ou imputadas na prestação devida, se do mesmo gênero da principal.','<strong>Art. 418 do Código Civil:</strong> Se a parte que deu as arras não executar o contrato, poderá a outra tê-lo por desfeito, retendo-as; se a inexecução for de quem as recebeu, poderá quem as deu haver o contrato por desfeito, e exigir sua devolução mais o equivalente, com atualização monetária segundo índices oficiais regularmente estabelecidos, juros e honorários de advogado.'])}

${clausula('CLÁUSULA IV — DA POSSE E DA ENTREGA DAS CHAVES',
`A posse do imóvel será transferida ao COMPRADOR(A) em <strong>${campo('35%','DD/MM/AAAA / na data da escritura definitiva / após quitação integral')}</strong>, ocasião em que serão entregues todas as chaves, controles de acesso, documentos, manuais e demais pertences do imóvel.<br><br>
Após a entrega das chaves, todas as despesas do imóvel (IPTU, condomínio, energia, água, etc.) passarão a ser de responsabilidade exclusiva do COMPRADOR(A), mesmo que a escritura ainda não tenha sido lavrada.`,
['<strong>Art. 1.204 do Código Civil:</strong> Adquire-se a posse desde o momento em que se torna possível o exercício, em nome próprio, de qualquer dos poderes inerentes à propriedade.'])}

${clausula('CLÁUSULA V — DA ESCRITURA DEFINITIVA E DO REGISTRO',
`A escritura pública definitiva de compra e venda será lavrada em Tabelionato de Notas escolhido pelo COMPRADOR(A), no prazo de <strong>${campo('8%','30')} (${campo('18%','trinta')}) dias</strong> contados da quitação integral do preço ou da aprovação do financiamento bancário, o que ocorrer primeiro.<br><br>
Todas as despesas decorrentes do ITBI, emolumentos cartorários, escritura e registro são de responsabilidade do COMPRADOR(A). As despesas com certidões negativas e averbações anteriores à venda são de responsabilidade do VENDEDOR(A).`,
['<strong>Art. 1.245 do Código Civil:</strong> Transfere-se entre vivos a propriedade mediante o registro do título translativo no Registro de Imóveis.','<strong>Art. 1.246 do Código Civil:</strong> O registro é eficaz desde o momento em que se apresentar o título ao oficial do registro.','<strong>Art. 490 do Código Civil:</strong> Salvo cláusula em contrário, ficarão as despesas de escritura e registro a cargo do comprador.'])}

${clausula('CLÁUSULA VI — DA IRREVOGABILIDADE, IRRETRATABILIDADE E ADJUDICAÇÃO COMPULSÓRIA',
`O presente contrato é celebrado em caráter <strong>IRREVOGÁVEL E IRRETRATÁVEL</strong>, obrigando as partes, seus herdeiros, sucessores e cessionários ao seu fiel e integral cumprimento.<br><br>
O COMPRADOR(A) fica investido no direito real de aquisição do imóvel, podendo registrar este instrumento no Cartório de Registro de Imóveis para oponibilidade a terceiros e, em caso de recusa do VENDEDOR(A) em outorgar a escritura definitiva, requerer judicialmente a adjudicação compulsória.`,
['<strong>Art. 1.417 e 1.418 do Código Civil:</strong> O promitente comprador adquire direito real à aquisição do imóvel e pode exigir a outorga da escritura definitiva ou requerer a adjudicação compulsória.'])}

${clausula('CLÁUSULA VII — DA CLÁUSULA PENAL E DAS PENALIDADES',
`Em caso de inadimplemento de qualquer obrigação deste instrumento, a parte inocente, além da devolução das arras nos termos da Cláusula III, poderá optar pela resolução do contrato com cobrança de multa de <strong>${campo('5%','10')}% (${campo('22%','dez por cento')})</strong> sobre o valor total, acrescida de correção monetária, juros de 1% a.m. e honorários advocatícios de 20%.<br><br>
Alternativamente, a parte inocente poderá exigir o cumprimento específico da obrigação, com aplicação de multa diária (astreinte) de R$ ${campo('14%','500,00')} por dia de descumprimento, até o adimplemento ou rescisão judicial.`,
['<strong>Art. 408 e seguintes do Código Civil:</strong> A cláusula penal é a convenção acessória à obrigação, pela qual as partes fixam antecipadamente a indenização devida pela inexecução culposa da obrigação.','<strong>Art. 536 do CPC:</strong> No cumprimento de sentença que reconheça a exigibilidade de obrigação de fazer ou de não fazer, o juiz poderá, a requerimento, aplicar medidas necessárias à satisfação do exequente, entre elas a imposição de multa.'])}

${clausula('CLÁUSULA VIII — DA COMISSÃO DE CORRETAGEM',
`A comissão de corretagem devida à FCOSTA GESTÃO IMOBILIÁRIA é de ${campo('5%','6')}% sobre o valor da transação, totalizando R$ ${campo('18%','0.000,00')}, de responsabilidade do <strong>${campo('25%','VENDEDOR(A) / COMPRADOR(A)')}</strong>, a ser paga na data da assinatura deste instrumento.`,
['<strong>Art. 725 do Código Civil:</strong> A remuneração é devida ao corretor uma vez que tenha conseguido o resultado previsto no contrato de mediação.'])}

${clausula('CLÁUSULA IX — DO FORO',
`Foro da Comarca de ${campo('30%','CIDADE/ESTADO')}. Firmado em ${campo('6%','3')} (${campo('18%','três')}) vias de igual teor — uma para cada parte e uma para o arquivo da corretora.`,
['<strong>Art. 1.417 do Código Civil:</strong> Registrado no CRI, o compromisso de compra e venda confere ao promitente comprador direito real à aquisição.'])}
${assinaturas('PROMITENTE VENDEDOR(A)','PROMITENTE COMPRADOR(A)')}`,

function gerarConteudo(){
  const sel = document.getElementById('selectModel').value;
  const editor = document.getElementById('editor');
  const headerData = document.getElementById('headerData');
  modeloAtual = sel;

  if(modelos[sel]){
    editor.innerHTML = modelos[sel]();
    headerData.innerHTML = `<div style="font-size:9pt;">${hoje()}</div>`;
  } else {
    editor.innerHTML = `<div class="placeholder-msg"><div class="icon">⚖️</div><div>Selecione um modelo de documento<br>no menu superior para iniciar</div></div>`;
    headerData.innerHTML = '';
  }

  if(sel === 'recibo_aluguel') setTimeout(calcularMoraAluguel, 100);
}
