<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV FCosta — Vídeos em Loop</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--azul:#003da5;--vermelho:#dc1c2d;--preto:#0d1829;}
html,body{width:100%;overflow-x:hidden;font-family:'DM Sans',sans-serif;background:var(--preto);}

.tv-section{background:var(--preto);padding:60px 0 48px;width:100%;}

.tv-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px 32px;gap:12px;flex-wrap:wrap;
}
.tv-titulo{
  font-family:'Playfair Display',serif;font-size:clamp(20px,3vw,32px);
  color:white;position:relative;padding-left:16px;
}
.tv-titulo::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:5px;height:80%;background:var(--vermelho);border-radius:3px;
}
.tv-link-yt{
  display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:13px;
  color:rgba(255,255,255,0.8);text-decoration:none;white-space:nowrap;
  padding:7px 14px;border:1.5px solid rgba(255,255,255,0.4);border-radius:6px;
  transition:all 0.2s;flex-shrink:0;
}
.tv-link-yt:hover{background:white;color:var(--azul);border-color:white;}

/* Player principal */
.tv-player-wrap{
  padding:0 20px 32px;
}
.tv-player-box{
  position:relative;width:100%;max-width:900px;margin:0 auto;
  border-radius:16px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  border:3px solid rgba(220,28,45,0.4);
  background:#000;aspect-ratio:16/9;
}
.tv-player-box iframe{
  position:absolute;inset:0;width:100%;height:100%;border:none;display:block;
}

/* Botões de controle loop */
.tv-controls{
  display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
  padding:0 20px 32px;
}
.tv-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;border:none;font-family:'DM Sans',sans-serif;
  transition:all 0.2s;text-decoration:none;
}
.tv-btn-primary{background:var(--vermelho);color:white;}
.tv-btn-primary:hover{background:#b01420;}
.tv-btn-secondary{background:rgba(255,255,255,0.1);color:white;border:1.5px solid rgba(255,255,255,0.25);}
.tv-btn-secondary:hover{background:rgba(255,255,255,0.2);}
.tv-btn-yt{background:#ff0000;color:white;}
.tv-btn-yt:hover{background:#cc0000;}

/* Status loop */
.tv-loop-status{
  text-align:center;padding:0 20px 24px;
  font-size:12px;color:rgba(255,255,255,0.45);
}
.tv-loop-status span{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.07);padding:5px 14px;border-radius:20px;
}
.tv-loop-dot{
  width:7px;height:7px;border-radius:50%;
  background:#25d366;animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* Separador */
.tv-sep{height:1px;background:rgba(255,255,255,0.08);margin:0 20px 32px;}

/* Info playlist */
.tv-playlist-info{
  padding:0 20px;
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;margin:0 20px 32px;
  padding:16px 20px;
}
.tv-playlist-icon{
  width:44px;height:44px;border-radius:10px;
  background:var(--vermelho);display:flex;align-items:center;justify-content:center;
  font-size:20px;color:white;flex-shrink:0;
}
.tv-playlist-text h4{font-size:14px;font-weight:700;color:white;margin-bottom:3px;}
.tv-playlist-text p{font-size:12px;color:rgba(255,255,255,0.45);}

@media(max-width:480px){
  .tv-section{padding:40px 0 32px;}
  .tv-player-box{border-radius:10px;border-width:2px;}
  .tv-controls{gap:8px;}
  .tv-btn{padding:9px 14px;font-size:12px;}
}
</style>
</head>
<body>

<div class="tv-section">

  <div class="tv-header">
    <h2 class="tv-titulo">📺 TV FCosta</h2>
    <a href="https://youtube.com/playlist?list=PLdp-2xOUACEYX6KQWKVvwi_M0Vkdo3Ac1&si=A1czLGG1zbCvjPMx"
       target="_blank" rel="noopener noreferrer" class="tv-link-yt">
      <i class="fab fa-youtube"></i> Ver no YouTube <i class="fas fa-external-link-alt"></i>
    </a>
  </div>

  <!-- Player principal com loop ativado -->
  <div class="tv-player-wrap">
    <div class="tv-player-box">
      <iframe
        id="tv-iframe"
        src="https://www.youtube.com/embed/videoseries?list=PLdp-2xOUACEYX6KQWKVvwi_M0Vkdo3Ac1&autoplay=1&loop=1&rel=0&modestbranding=1&controls=1&mute=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
        title="TV FCosta — FCosta Corretor de Imóveis CRECI-SP 294791-F">
      </iframe>
    </div>
  </div>

  <!-- Status loop -->
  <div class="tv-loop-status">
    <span><div class="tv-loop-dot"></div> Playlist em loop contínuo — FCosta Corretor de Imóveis</span>
  </div>

  <!-- Controles -->
  <div class="tv-controls">
    <button class="tv-btn tv-btn-primary" onclick="reiniciarLoop()">
      <i class="fas fa-redo"></i> Reiniciar Loop
    </button>
    <button class="tv-btn tv-btn-secondary" onclick="ativarSom()">
      <i class="fas fa-volume-up"></i> Ativar Som
    </button>
    <a href="https://youtube.com/playlist?list=PLdp-2xOUACEYX6KQWKVvwi_M0Vkdo3Ac1&si=A1czLGG1zbCvjPMx"
       target="_blank" rel="noopener noreferrer" class="tv-btn tv-btn-yt">
      <i class="fab fa-youtube"></i> Abrir no YouTube
    </a>
    <a href="https://fcostacorretor.com/videos-imobiliarios"
       class="tv-btn tv-btn-secondary">
      <i class="fas fa-film"></i> Todos os Vídeos
    </a>
  </div>

  <div class="tv-sep"></div>

  <!-- Info da playlist -->
  <div class="tv-playlist-info">
    <div class="tv-playlist-icon"><i class="fas fa-play"></i></div>
    <div class="tv-playlist-text">
      <h4>Playlist FCosta Corretor de Imóveis</h4>
      <p>Vídeos sobre imóveis, dicas, lançamentos e mercado imobiliário em São Paulo · CRECI-SP 294791-F</p>
    </div>
  </div>

</div>

<script>
/* ===== ID da playlist ===== */
var PLAYLIST_ID = 'PLdp-2xOUACEYX6KQWKVvwi_M0Vkdo3Ac1';

/* URL base — muted=1 garante autoplay + loop sem bloqueio do browser */
function buildSrc(muted){
  return 'https://www.youtube.com/embed/videoseries'
    + '?list=' + PLAYLIST_ID
    + '&autoplay=1'
    + '&loop=1'
    + '&rel=0'
    + '&modestbranding=1'
    + '&controls=1'
    + (muted !== false ? '&mute=1' : '');
}

/* Reinicia o player (força novo loop) */
function reiniciarLoop(){
  var iframe = document.getElementById('tv-iframe');
  iframe.src = '';
  setTimeout(function(){ iframe.src = buildSrc(true); }, 200);
}

/* Ativa som — recarrega sem mute */
function ativarSom(){
  var iframe = document.getElementById('tv-iframe');
  iframe.src = buildSrc(false);
}

/* Auto-reinício a cada 3h para garantir loop mesmo em TVs/totens */
setInterval(function(){ reiniciarLoop(); }, 3 * 60 * 60 * 1000);
</script>

</body>
</html>
